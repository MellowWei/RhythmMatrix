<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAPM_V24_FORCED_COLLAPSE</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #s { width: 550px; border-right: 1px solid var(--dim); display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; padding: 120px 25px 20px; scrollbar-width: none; }
        .status-bar { position: absolute; top: 0; width: 550px; padding: 25px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--dim); z-index: 11; backdrop-filter: blur(10px); }
        .res-display { font-size: 28px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .card { border: 1px solid var(--dim); background: #080808; padding: 20px; margin-bottom: 20px; }
        .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .m-box { background: #0c0c0c; padding: 10px; border: 1px solid #222; text-align: center;}
        .m-label { font-size: 10px; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .m-val { font-size: 16px; color: var(--w); font-weight: bold; }
        .section { margin-top: 15px; padding: 12px; font-size: 14px; line-height: 1.6; border-radius: 2px; }
        .sci { border-left: 2px solid var(--n); color: #888; background: rgba(0,255,204,0.03); margin-bottom: 10px; }
        .con { border-left: 2px solid var(--g); color: var(--w); background: rgba(255,204,0,0.05); font-weight: 500; }
        #cmd-box { padding: 25px; border-top: 1px solid var(--dim); }
        #cmd { background: #0a0a0a; border: 1px solid var(--n); color: var(--w); width: 100%; padding: 15px; outline: none; font-size: 16px; }
        #stage { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-display">魏珏然 // 全量变量计算引擎</div>
            <div style="font-size:10px; color:var(--n); opacity:0.8; letter-spacing: 2px;">SOCIAL_VARIABLE_SET_V24.2</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box"><input id="cmd" placeholder="输入变量命题 (如：两口子凑合、专家的话)..." autofocus autocomplete="off"></div>
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let State = { hz: 60, lambda: 20, t: 0 };

        // 核心硬编码数据库：通过正则实现全量自然语言命题命中
        const COLLAPSE_RULES = [
            {
                pattern: /性别|身份|身体|种族|民族|国籍|角色|我是谁/,
                t: "2029.2Y", i: 85, l: 42, p: "88.2%",
                sci: "身份属性与生物基础脱钩，转化为高维意识的频率标识。",
                con: "这辈子你以为你是谁、哪国人、什么性别都不再作数。人只剩下频率的区别。"
            },
            {
                pattern: /权力|法律|制度|官僚|合法性|国家|接班|管理/,
                t: "2039.0Y", i: 95, l: 40, p: "25.4%",
                sci: "生理寿命红线强制拦截因果惯性。现行制度的合法性基石因物理能量耗尽而坍缩。",
                con: "到日子了，权力就跟电断了一样彻底熄火。法律和规矩没人接茬，因为旧节奏转不动了。"
            },
            {
                pattern: /语言|叙事|意识形态|书|沟通|说话|文字|废话/,
                t: "2037.5Y", i: 160, l: 62, p: "90.1%",
                sci: "符号系统过载导致信息熵增至临界点。沟通转为全感官直感对齐。",
                con: "说话不仅没人信，连听都嫌费劲。动动念头对方就懂，现在的这些书和话全是废纸垃圾。"
            },
            {
                pattern: /道德|规范|禁忌|地位|荣誉|面子|规矩/,
                t: "2031.6Y", i: 110, l: 55, p: "75.4%",
                sci: "文明重心位移引发全球价值场重组。禁忌与荣誉参考系发生根本性扭转。",
                con: "以前觉得要脸、有德的事，以后可能啥也不是。重心换地方了，规矩得跟着新主人的呼吸走。"
            },
            {
                pattern: /经济|财富|钱|资产|发财|阶级|财富分配|劳动/,
                t: "2032.8Y", i: 125, l: 48, p: "68.2%",
                sci: "劳动意义从物质占有转向能量交换。基于债务的旧阶级结构瞬间坍缩。",
                con: "挣钱和攒资产的玩法彻底废了。阶级分层会随着你脑子里的频率高低重新洗牌，钱没用了。"
            },
            {
                pattern: /家庭|婚姻|两口子|凑合|亲密|性|生孩子|抚育/,
                t: "2028.5Y", i: 105, l: 60, p: "92.4%",
                sci: "亲密关系由社会协作协议回归至灵魂共振模型。传统结构自然解体。",
                con: "两口子和家庭那种死凑合的过法会大面积崩溃。关系的唯一标准是频率对不对，别的不扯淡。"
            },
            {
                pattern: /知识|科学|真理|专家|权威|教育|学校/,
                t: "2038.2Y", i: 155, l: 65, p: "78.5%",
                sci: "专家权威与实验实证的认知模型遭受高维干涉扇击。",
                con: "学校教的东西和专家说的真理，到时候会被外力一巴掌扇碎。真理就是你看到的，不用证明。"
            },
            {
                pattern: /媒体|算法|刷手机|注意力|舆论|带节奏|平台/,
                t: "2027.3Y", i: 145, l: 52, p: "95.6%",
                sci: "算法分配导致的注意力黑洞引发意识过载灾难。",
                con: "算法会把人脑子刷爆，大家最后都看吐了。舆论乱成一锅粥，没人能再带节奏，也没人听节奏。"
            },
            {
                pattern: /信任|冲突|认同|认账|死敌|社会资本/,
                t: "2027.8Y", i: 130, l: 58, p: "91.2%",
                sci: "社会资本在频率互斥中归零。信任取决于能量场是否能够兼容共振。",
                con: "人跟人之间彻底没信任了。能不能处，看一眼磁场就明白，频率对不上的直接就是死敌。"
            }
        ];

        function calc(input) {
            let res = COLLAPSE_RULES.find(r => r.pattern.test(input));
            
            // 兜底逻辑：如果连正则都没命中，说明是高频未知变量
            if (!res) {
                res = { t: "2030.4Y", p: "82.4%", i: 115, l: 45, sci: "文明重心位移引发的全域参数重置。", con: "该命题已进入重心搬家窗口，旧逻辑无法解析，世界将按新频率重排。" };
            }

            State.hz = res.i || 115; State.lambda = res.l || 45;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="color:var(--g); font-weight:bold; font-size:12px;">脉冲响应：${input}</div>
                <div class="m-grid">
                    <div class="m-box"><div class="m-label">视界时间 (T)</div><div class="m-val">${res.t}</div></div>
                    <div class="m-box"><div class="m-label">坍缩概率 (P)</div><div class="m-val">${res.p}</div></div>
                </div>
                <div class="section sci"><b>科学实证：</b>${res.sci}</div>
                <div class="section con"><b>白话定论：</b>${res.con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function render() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 5) {
                const y = midY + Math.sin(x*0.005 + State.t) * State.hz + Math.cos(x*0.01 + State.t) * State.lambda;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke(); State.t += 0.05; requestAnimationFrame(render);
        }
        cmd.onkeydown = (e) => { if (e.key === 'Enter' && cmd.value) { calc(cmd.value); cmd.value = ''; } };
        render();
    </script>
</body>
</html>
