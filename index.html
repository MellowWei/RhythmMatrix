<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAPM_V24_FINAL_CORE</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #s { width: 550px; border-right: 1px solid var(--dim); display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; padding: 120px 25px 20px; scrollbar-width: none; }
        .status-bar { position: absolute; top: 0; width: 550px; padding: 25px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--dim); z-index: 11; backdrop-filter: blur(10px); }
        .res-display { font-size: 32px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .card { border: 1px solid var(--dim); background: #080808; padding: 20px; margin-bottom: 20px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .m-box { background: #0c0c0c; padding: 10px; border: 1px solid #222; }
        .m-label { font-size: 10px; color: #555; margin-bottom: 5px; }
        .m-val { font-size: 16px; color: var(--w); font-weight: bold; }
        .section { margin-top: 15px; padding: 12px; font-size: 14px; line-height: 1.6; }
        .sci { border-left: 2px solid var(--n); color: #888; background: #0a0a0a; margin-bottom: 10px; }
        .con { border-left: 2px solid var(--g); color: var(--w); background: #111; font-weight: 500; }
        #cmd-box { padding: 25px; border-top: 1px solid var(--dim); }
        #cmd { background: #0a0a0a; border: 1px solid var(--n); color: var(--w); width: 100%; padding: 15px; outline: none; }
        #stage { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-display">RAPM 全域变量引擎</div>
            <div style="font-size:10px; color:var(--n); opacity:0.8;">魏珏然 // 因果校准完毕</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box"><input id="cmd" placeholder="输入变量 (如：性别、权力、经济)..." autofocus autocomplete="off"></div>
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let State = { hz: 60, lambda: 20, t: 0 };

        // 缝合后的核心逻辑库
        const DATABASE = {
            "性别": { t: "2029.2Y", p: "88.2%", i: 85, l: 42, sci: "身份属性与生物基础脱钩，转化为高维意识的频率标识。", con: "你以为你是谁、什么性别都不再作数。人只剩下频率的区别。" },
            "身份": { t: "2029.2Y", p: "88.2%", i: 85, l: 42, sci: "旧有的分类标签因无法承载新的生命能量而发生物理碎裂。", con: "哪国人、什么身份都没用，在那节点之后，标签全都碎一地。" },
            "权力": { t: "2039.0Y", p: "25.4%", i: 95, l: 40, sci: "生理寿命极限强制终结因果惯性。现行制度的合法性基石因物理能量耗尽而坍缩。", con: "到日子了，权力就跟电断了一样彻底熄火。法律和规矩没人接茬。" },
            "语言": { t: "2037.5Y", p: "90.1%", i: 160, l: 62, sci: "符号系统过载导致信息熵增至临界点。沟通演进为全感官直感对齐。", con: "说话不仅没人信，连听都嫌费劲。现在的这些书和话全是废纸垃圾。" },
            "道德": { t: "2031.6Y", p: "75.4%", i: 110, l: 55, sci: "文明重心位移引发全球价值场重组。禁忌与荣誉的参考系发生根本性扭转。", con: "以前觉得要脸、有德的事，以后可能啥也不是。重心换了，规矩得跟着新主人的呼吸走。" },
            "经济": { t: "2032.8Y", p: "68.2%", i: 125, l: 48, sci: "劳动意义从物质占有转向能量交换。基于债务的旧阶级结构瞬间坍缩。", con: "挣钱和攒资产的玩法彻底废了。阶级分层会随着你脑子里的频率高低重新洗牌。" },
            "家庭": { t: "2028.5Y", p: "92.4%", i: 105, l: 60, sci: "亲密关系由社会协作协议回归至灵魂共振模型。传统结构自然解体。", con: "两口子和家庭那种死凑合的过法大面积崩溃。关系的唯一标准是频率对不对。" },
            "科学": { t: "2038.2Y", p: "78.5%", i: 155, l: 65, sci: "专家权威与实验实证的认知模型遭受高维干涉扇击。", con: "学校教的东西和专家说的真理，会被外力一巴掌扇碎。真理就是你看到的。" },
            "历史": { t: "2035.1Y", p: "81.0%", i: 90, l: 70, sci: "线性时间叙事被即时存在态取代。历史不再作为负载干扰当下。", con: "别被历史绊住，以后只有‘当下’，记忆会像重装系统一样干净。" },
            "算法": { t: "2027.3Y", p: "95.6%", i: 145, l: 52, sci: "算法分配导致的注意力黑洞引发意识过载灾难。公共舆论丧失组织能力。", con: "算法会把人脑子刷爆，大家最后都看吐了。舆论乱成一锅粥，没人带节奏。" },
            "信任": { t: "2027.8Y", p: "91.2%", i: 130, l: 58, sci: "社会资本在频率互斥中归零。信任取决于生命能量场是否能够兼容共振。", con: "人跟人之间彻底没信任了。能不能处，看一眼磁场就明白，频率对不上的直接就是死敌。" }
        };

        function calc(val) {
            let key = Object.keys(DATABASE).find(k => val.includes(k));
            let res = DATABASE[key];
            if (!res) {
                res = { t: "2030.5Y", p: "65.9%", i: 84, l: 58, sci: "正在探测此脉冲的因果厚度。", con: "此节律将在视界节点处完成相位对齐。" };
            }
            State.hz = res.i; State.lambda = res.l;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="color:var(--g); font-weight:bold;">脉冲响应：${val}</div>
                <div class="m-grid">
                    <div class="m-box"><div class="m-label">视界时间</div><div class="m-val">${res.t}</div></div>
                    <div class="m-box"><div class="m-label">强度 (Hz)</div><div class="m-val">${res.i}</div></div>
                </div>
                <div class="section sci"><b>科学实证：</b>${res.sci}</div>
                <div class="section con"><b>白话定论：</b>${res.con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function render() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 5) {
                const y = midY + Math.sin(x*0.005 + State.t) * State.hz + Math.cos(x*0.01 + State.t) * State.lambda;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke(); State.t += 0.05; requestAnimationFrame(render);
        }
        cmd.onkeydown = (e) => { if (e.key === 'Enter' && cmd.value) { calc(cmd.value); cmd.value = ''; } };
        render();
    </script>
</body>
</html>
