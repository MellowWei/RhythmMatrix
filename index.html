<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADM v38 | 魏珏然的因果实验室</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --ink: #000000; --dim: #888888; --trace: #C5A059; --accent: #D15B70; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Noto Serif SC', serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .app-shell { display: flex; width: 100%; min-height: 100vh; }
        
        /* 响应式侧边栏 */
        .sidebar { width: 450px; border-right: 1px solid var(--ink); padding: 40px; height: 100vh; overflow-y: auto; background: #fff; z-index: 10; transition: all 0.5s ease; }
        .header { font-family: 'Ma Shan Zheng'; font-size: 26px; border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 4px; text-align: center; }
        
        /* 锚点样式 */
        .slider-unit { margin-bottom: 18px; position: relative; padding: 10px; border: 1px solid transparent; transition: 0.3s; cursor: pointer; }
        .slider-unit.is-anchor { border-color: var(--accent); background: rgba(209, 91, 112, 0.03); }
        .lock-hint { font-size: 9px; color: var(--accent); position: absolute; right: 10px; top: 5px; opacity: 0; transition: 0.3s; }
        .is-anchor .lock-hint { opacity: 1; }

        .input-block { margin-bottom: 25px; }
        .textarea-box { border: 1px solid var(--ink); padding: 12px; background: #FFF; }
        textarea { width: 100%; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.6; font-family: inherit; height: 60px; }

        .stage { background: #fafafa; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; flex: 1; position: relative; }
        .taiji-orb { width: min(70vw, 400px); height: min(70vw, 400px); border-radius: 50%; border: 1px solid var(--ink); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: white; }
        .ink-wave { position: absolute; bottom: 0; width: 100%; background: var(--ink); transition: height 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .prob-display { font-family: 'Ma Shan Zheng'; font-size: 80px; z-index: 10; mix-blend-mode: difference; color: white; }

        @media screen and (max-width: 900px) {
            .app-shell { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: auto; border-right: none; border-top: 1px solid var(--ink); }
            .stage { height: 50vh; min-height: 350px; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="header">一念·因果本原 v38</div>
        <div style="font-size: 9px; color: var(--dim); text-align: center; margin-bottom: 20px;">[ 双击任意变量以设定为稳定锚点 ]</div>
        
        <div class="input-block">
            <label style="font-size:11px; font-weight:900; color:var(--accent);">愿景描述</label>
            <div class="textarea-box"><textarea id="nlp-desc" placeholder="输入愿景，系统将捕捉爱与时间..." oninput="Engine.calc()"></textarea></div>
        </div>

        <div id="slider-root"></div>
    </aside>

    <main class="stage">
        <div class="taiji-orb" id="orb">
            <div id="wave" class="ink-wave"></div>
            <div id="prob" class="prob-display">0%</div>
        </div>
        <div id="logic-info" style="margin-top:20px; font-size:12px; color:var(--dim); text-align:center;">监测节律中...</div>
    </main>
</div>

<script>
const Matrix = [
    { id: 'st', name: '逻辑骨架', fields: ['准入门槛', '资粮匹配', '因缘完整'] },
    { id: 'ag', name: '意志执行', fields: ['愿力承载', '执行强度'] }
];

let Vals = {};
let Anchors = {}; 

const Engine = {
    init() { this.render(); this.calc(); },
    render() {
        const root = document.getElementById('slider-root');
        root.innerHTML = Matrix.map(m => `
            <div style="margin-bottom:20px;">
                <div style="font-weight:900; font-size:14px; margin-bottom:10px;">${m.name}</div>
                ${m.fields.map(f => {
                    const k = m.id + '_' + f; Vals[k] = 3.0;
                    return `
                        <div class="slider-unit" id="unit-${k}" ondblclick="Engine.toggleAnchor('${k}')">
                            <span class="lock-hint">ANCHOR ACTIVE</span>
                            <div style="display:flex; justify-content:space-between; font-size:11px;">
                                <span>${f}</span><span id="v-${k}">3.0</span>
                            </div>
                            <input type="range" class="main-range" style="width:100%" min="0" max="5" step="0.1" value="3" oninput="Engine.update('${k}', this.value)">
                        </div>`;
                }).join('')}
            </div>`).join('');
    },
    toggleAnchor(k) {
        Anchors[k] = !Anchors[k];
        document.getElementById(`unit-${k}`).classList.toggle('is-anchor');
        this.calc();
    },
    update(k, v) { 
        if (Anchors[k]) return; // 锚点锁定后不可滑动
        Vals[k] = parseFloat(v); 
        document.getElementById(`v-${k}`).innerText = Vals[k].toFixed(1); 
        this.calc(); 
    },
    calc() {
        const wish = document.getElementById('nlp-desc').value;
        let totalWeightedScore = 0;
        let totalWeight = 0;

        Object.keys(Vals).forEach(key => {
            // 锚点权重提升 3 倍，作为系统定子
            let weight = Anchors[key] ? 3.0 : 1.0;
            totalWeightedScore += Vals[key] * weight;
            totalWeight += 5 * weight;
        });

        let p = (totalWeightedScore / totalWeight) * 100;

        // 引入“爱”的非线性收敛算法
        if (/(爱|love|共鸣)/.test(wish)) {
            p = Math.pow(p / 100, 0.7) * 100; // 降低熵值，向高位坍缩
        }

        p = Math.max(0.1, Math.min(99.9, p));
        document.getElementById('prob').innerText = Math.round(p) + "%";
        document.getElementById('wave').style.height = Math.round(p) + "%";
        document.getElementById('orb').style.transform = `scale(${1 + p/1000})`;
    }
};
window.onload = () => Engine.init();
</script>
</body>
</html>
