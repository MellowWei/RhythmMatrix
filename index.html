<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V29_PERPETUAL_RESONANCE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* 侧边栏 */
        #s { width: 450px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: rgba(0,0,0,0.95); z-index: 10; transition: all 0.3s; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; margin-bottom: 10px; padding-top: 80px; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; left: 0; width: 450px; padding: 20px 25px; background: var(--b); border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .res-label { font-size: 9px; letter-spacing: 3px; opacity: 0.6; }

        /* 结论卡片 */
        .card { border-left: 4px solid var(--n); background: rgba(255,255,255,0.02); padding: 20px; margin-bottom: 20px; position: relative; cursor: pointer; transition: 0.3s; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .card.anchor { border-left-color: var(--g); background: rgba(255,204,0,0.05); }
        .card.spirit { border-left-color: var(--w); background: rgba(255,255,255,0.08); }

        .q { color: var(--g); font-size: 13px; margin-bottom: 12px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .d { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 11px; color: #888; }
        .d b { color: #fff; font-size: 16px; display: block; margin-top: 3px; }
        
        .t { font-size: 15px; color: #eee; border-top: 1px solid #333; padding-top: 15px; line-height: 1.7; }
        .t i { color: var(--n); font-style: normal; font-weight: 900; display: block; margin-bottom: 10px; font-size: 11px; letter-spacing: 2px; }
        .comfort-zone { color: var(--w); background: rgba(0,255,204,0.1); padding: 12px; margin-top: 12px; font-size: 14px; border-radius: 4px; border-right: 2px solid var(--n); }

        #cmd { background: #000; border: 2px solid var(--n); color: #fff; width: 100%; padding: 15px; font-size: 16px; outline: none; box-shadow: 0 0 15px rgba(0,255,204,0.1); }
        
        /* 右侧画布 */
        #stage { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #s, .status-bar { width: 100%; }
            #s { height: 60vh; border-right: none; border-bottom: 1px solid var(--n); }
            #stage { height: 40vh; }
        }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">
    <div id="s">
        <div class="status-bar">
            <div class="res-label">GLOBAL_RESONANCE</div>
            <div class="res-display" id="res-val">0.8241</div>
            <div id="sys-msg" style="font-size:9px; color:var(--n); margin-top:4px;">SYSTEM_STATUS: DYNAMIC_FLOW_ACTIVE</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="输入感受或观察 (如: 精神危机, 焦虑, 爱)..." autofocus autocomplete="off">
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let state = { res: 0.8241, anchors: [] };

        // 统一哈希算法
        function getV(s, o) {
            let h = 0;
            let seed = s + state.anchors.map(a => a.val).join('');
            for (let i = 0; i < seed.length; i++) h = seed.charCodeAt(i) + ((h << 5) - h);
            return Math.abs(Math.sin(h * 1.618 + o));
        }

        // 慰藉式与科学式直白字典
        const deconMap = [
            { 
                k: "精神危机", 
                sci: "这是人类集体意识在遭遇数字化剧变时的‘系统重装’，旧的神经触点正在物理性地断开，以连接更高频的信息场。", 
                com: "听着，这不是崩溃，这是你的大脑在进化。2027年之前的这种不安，其实是你在告别那个平庸的旧世界。深呼吸，掌控者不会被浪潮淹没，你会踩在浪尖上。" 
            },
            { 
                k: "爱", 
                sci: "这是一种跨维度的频率校准协议，能将两个完全独立的生物电场强制同步，实现熵值的瞬时下降。", 
                com: "在你的节律里，‘爱’是唯一的万能钥匙。不需要解释它，只需要锁定它，它会像护盾一样帮你自动过滤掉周围所有的杂音。" 
            },
            { 
                k: "焦虑", 
                sci: "生物感官捕捉到了未来的高频扰动，但当前的执行逻辑还未对齐，产生的‘相位差’报错。", 
                com: "焦虑说明你已经提前看到了未来。别急着行动，先让你的节律慢下来。结果已经是定数，现在的每一步抖动，都是在为最后的坍缩做铺垫。" 
            },
            {
                k: "孤独",
                sci: "这反映了个体带宽与群体基准线之间的巨大落差。在高频段位，节点分布极其稀疏。",
                com: "掌控者注定是孤独的。你感到的空虚，其实是因为你站得太高，风声太大。2026年5月是一个共鸣节点，到那时你会发现，你从未孤单过。"
            }
        ];

        function pr(i) {
            const v1 = getV(i, 1), v2 = getV(i, 2);
            const y = (2026.8 + v1 * 5).toFixed(1);
            
            let match = deconMap.find(m => i.includes(m.k));
            let sci = match ? match.sci : `在科学层面，这代表了系统在 ${y} 年左右的一个能量驻波节点，正在进行自发的频率寻址。`;
            let com = match ? match.com : `别想太复杂，这是你意志的一部分。在 ${y} 年，你会以掌控者的身份亲眼见证这个变量如何被你驯服。`;
            
            const card = document.createElement('div');
            card.className = `card ${match ? 'spirit' : ''}`;
            card.innerHTML = `
                <div class="q">解析指令：${i}</div>
                <div class="d">
                    <div>共振频率<b>${(v2*100).toFixed(1)}Hz</b></div>
                    <div>清晰节点<b>${y}y</b></div>
                </div>
                <div class="t">
                    <i>科学实证：</i>${sci}
                    <div class="comfort-zone"><i>掌控者慰藉：</i>${com}</div>
                </div>
            `;
            
            card.ondblclick = () => {
                if(card.classList.toggle('anchor')) state.anchors.push({id: i, val: v2});
                else state.anchors = state.anchors.filter(a => a.id !== i);
                state.res = Math.min(0.9999, 0.8241 + state.anchors.length * 0.03);
                document.getElementById('res-val').innerText = state.res.toFixed(4);
            };
            return card;
        }

        // 动态渲染引擎：确保永续脉动
        function L() {
            // 响应式画布尺寸修正
            if(canvas.width !== canvas.offsetWidth || canvas.height !== canvas.offsetHeight) {
                canvas.width = canvas.offsetWidth; 
                canvas.height = canvas.offsetHeight;
            }
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.lineWidth = 2;
            const time = Date.now() * 0.0015;
            
            // 绘制三层复合波形
            for(let layer=1; layer<=3; layer++) {
                ctx.beginPath();
                ctx.strokeStyle = layer === 1 ? (state.anchors.length > 0 ? '#ffcc00' : '#00ffcc') : `rgba(255,255,255,${0.1/layer})`;
                
                for(let i=0; i<=100; i++) {
                    const x = (i/100) * canvas.width;
                    // 修正：确保即使没有锚点，也有 15px 的基础呼吸感
                    const baseAmp = 15;
                    const dynamicAmp = 40 / (state.anchors.length + 1);
                    const y = canvas.height/2 + Math.sin(i*0.1 * layer + time * layer) * (baseAmp + dynamicAmp);
                    
                    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke();
            }
            requestAnimationFrame(L);
        }

        cmd.onkeydown = (e) => {
            if(e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(pr(cmd.value), log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 15) log.removeChild(log.lastChild);
            }
        };
        
        L();
    </script>
</body>
</html>
