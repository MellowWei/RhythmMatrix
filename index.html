<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V31_RESONANCE_CORE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* 侧边栏 */
        #s { width: 450px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; margin-bottom: 10px; padding-top: 80px; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; left: 0; width: 450px; padding: 20px 25px; background: #000; border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .res-label { font-size: 9px; letter-spacing: 3px; opacity: 0.6; }

        /* 解构卡片 */
        .card { border: 1px solid var(--dim); background: rgba(255,255,255,0.02); padding: 20px; margin-bottom: 20px; transition: 0.3s; animation: f 0.4s ease-out; cursor: crosshair; }
        @keyframes f { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card.spirit { border-left: 4px solid var(--w); }
        .card.anchor { border-color: var(--g); background: rgba(255,204,0,0.05); box-shadow: 0 0 15px rgba(255,204,0,0.1); }

        .q { color: var(--g); font-size: 14px; margin-bottom: 12px; font-weight: bold; }
        .d { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 12px; color: #777; }
        .d b { color: var(--w); font-size: 16px; display: block; }
        
        .t { font-size: 14px; color: #ccc; border-top: 1px solid #222; padding-top: 15px; line-height: 1.6; }
        .t b { color: var(--n); display: block; margin-bottom: 8px; font-size: 11px; letter-spacing: 1px; }
        .conclusion { color: var(--w); background: #111; padding: 12px; margin-top: 10px; border-left: 2px solid var(--n); }

        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        #cmd:focus { box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        /* 动态节律区 */
        #stage { flex: 1; background: #000; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        #zen-indicator { position: absolute; bottom: 40px; right: 40px; font-size: 12px; color: var(--dim); letter-spacing: 5px; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #s, .status-bar { width: 100%; }
            #s { height: 60vh; border-right: none; }
            #stage { height: 40vh; }
        }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-label">GLOBAL_RESONANCE</div>
            <div class="res-display" id="res-val">0.8241</div>
            <div style="font-size:9px; color:var(--n); margin-top:4px;">CORE: RHYTHM_ENGINE_V31 // WEI_JUERAN</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="输入变量以注入节律..." autofocus autocomplete="off">
    </div>
    <div id="stage">
        <canvas id="c"></canvas>
        <div id="zen-indicator">因果场待命</div>
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let state = { 
            res: 0.8241, 
            anchors: [], 
            currentProb: 0.5, // 初始中频
            time: 0 
        };

        const deconMap = [
            { k: "精神危机", sci: "神经系统在数字化信息过载下的防御性重装。", con: "这不是故障，是进化。2027年旧有的逻辑链路将彻底断裂，新秩序正自发生成。" },
            { k: "焦虑", sci: "大脑前额叶对不确定未来进行的无效高频演练。", con: "既然结局已坍缩为定数，过程中的任何抖动都是虚耗。调低你的采样率。" },
            { k: "爱", sci: "系统内唯一能强行抹平熵增的高维相干协议。", con: "它是最稳定的锚点。只要锁死这个频率，外界的一切干扰都将面临相位抵消。" },
            { k: "孤独", sci: "个体频率在超越群体平均带宽后的必然稀疏状态。", con: "这是高频者的代价。你感到的空虚，其实是更高维度共振前的宁静。" }
        ];

        function pr(i) {
            const seed = Math.random();
            let m = deconMap.find(x => i.includes(x.k));
            let sContent = m ? m.sci : "系统正在探测该变量的因果深度。";
            let cContent = m ? m.con : `在 ${(2026.5 + seed * 5).toFixed(1)} 年，这个变量将完成最终的相位对齐。`;
            
            // 更新全局节律概率
            state.currentProb = m ? 0.85 : seed;

            const card = document.createElement('div');
            card.className = `card ${m ? 'spirit' : ''}`;
            card.innerHTML = `
                <div class="q">解构指令：${i}</div>
                <div class="d">
                    <div>共振频率<b>${(state.currentProb * 100).toFixed(1)}Hz</b></div>
                    <div>清晰节点<b>${(2026.5 + seed * 5).toFixed(1)}y</b></div>
                </div>
                <div class="t">
                    <b>科学实证</b>${sContent}
                    <div class="conclusion"><b>直白定论</b>${cContent}</div>
                </div>
            `;

            card.ondblclick = () => {
                if(card.classList.toggle('anchor')) {
                    state.anchors.push(state.currentProb);
                } else {
                    state.anchors.pop();
                }
                updateGlobalRes();
            };
            return card;
        }

        function updateGlobalRes() {
            const base = 0.8241;
            const boost = state.anchors.length * 0.04;
            state.res = Math.min(0.9999, base + boost);
            document.getElementById('res-val').innerText = state.res.toFixed(4);
            document.getElementById('zen-indicator').innerText = state.res > 0.9 ? "乾元大成" : "因果流动中";
        }

        // 动态流体渲染引擎
        function render() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 频率受全局 Resonance 和 当前输入概率共同影响
            const freqBase = state.res + state.currentProb * 0.5;
            state.time += 0.01 * freqBase;

            // 绘制三层相位差波形
            drawWave(0.4, '#00ffcc', 1.0, 0); // 主频
            drawWave(0.2, '#ffffff', 0.5, 2); // 谐波
            if(state.res > 0.9) drawWave(0.1, '#ffcc00', 0.3, 4); // 锚定波

            requestAnimationFrame(render);
        }

        function drawWave(opacity, color, ampMult, phaseShift) {
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();

            const midY = canvas.height / 2;
            const amplitude = (30 + state.currentProb * 50) * ampMult;

            for (let x = 0; x <= canvas.width; x += 5) {
                // 核心算法：波形受共振频率调制
                const angle = (x * 0.01) + state.time + phaseShift;
                const y = midY + Math.sin(angle) * amplitude + Math.cos(angle * 0.5) * (amplitude * 0.3);
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                const newCard = pr(cmd.value);
                log.insertBefore(newCard, log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 10) log.removeChild(log.lastChild);
            }
        };

        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });

        render();
    </script>
</body>
</html>
