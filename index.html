<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHYTHM_DETERMINISM_CORE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #222; }
        * { box-sizing: border-box; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #s { width: 450px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; padding-top: 85px; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; left: 0; width: 450px; padding: 20px 25px; background: #000; border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 42px; font-weight: 900; color: var(--w); letter-spacing: -2px; }
        .res-label { font-size: 9px; letter-spacing: 3px; opacity: 0.5; }

        .card { border: 1px solid var(--dim); background: rgba(255,255,255,0.01); padding: 22px; margin-bottom: 22px; animation: f 0.4s ease-out; }
        @keyframes f { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card.high-sync { border-left: 4px solid var(--n); background: rgba(0,255,204,0.03); }

        .q { color: var(--g); font-size: 14px; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .m-item { font-size: 10px; color: #666; text-transform: uppercase; }
        .m-item b { color: var(--w); font-size: 18px; display: block; margin-top: 2px; font-family: "Courier New", monospace; }
        
        .t { font-size: 14px; color: #bbb; border-top: 1px solid #222; padding-top: 15px; line-height: 1.7; }
        .conclusion { color: var(--w); background: #111; padding: 12px; margin-top: 10px; border-left: 2px solid var(--n); font-size: 14px; }

        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 18px; font-size: 16px; outline: none; }
        #stage { flex: 1; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; position: absolute; }

        @media (max-width: 850px) { body { flex-direction: column; } #s, .status-bar { width: 100%; } #s { height: 60vh; } #stage { height: 40vh; } }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-label">GLOBAL_RESONANCE</div>
            <div class="res-display" id="res-val">0.8241</div>
            <div style="font-size:9px; color:var(--n); margin-top:4px;">PHASE: DETERMINISTIC_SYNC</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="输入核心指令..." autofocus autocomplete="off">
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        
        let State = { res: 0.8241, prob: 0.1, intensity: 20, depth: 15, time: 0, anchors: 0 };

        // 确定性字典：确保核心指令结论不再跳变
        const DeterministicDictionary = {
            "世界性别结构": { sci: "生理分类逻辑坍缩，心理认同与功能属性成为新秩序地基。", con: "传统家庭逻辑将彻底解构。这不再是变量波动，而是节律的重塑。", p: 0.87, t: 2026.5, i: 150, d: 63 },
            "世界精神危机": { sci: "生物神经节律与数字化高频场相位失配，感官强制熔断。", con: "旧文明波形的终结。新文明将在2027年完成坍缩式重启。", p: 0.88, t: 2027.2, i: 140, d: 40 },
            "世界和平": { sci: "全域场能量由于熵增而产生的低频暂态平静。", con: "由于干涉深度不足，此状态极不稳定。视界节点处仍存在高频抖动。", p: 0.12, t: 2026.7, i: 23, d: 11 }
        };

        // 种子算法：确保模糊指令也能获得相对稳定的结论
        function getSeedData(input) {
            let hash = 0;
            for (let i = 0; i < input.length; i++) hash = input.charCodeAt(i) + ((hash << 5) - hash);
            const seed = (Math.abs(hash) % 1000) / 1000;
            
            return {
                p: 0.2 + seed * 0.6,
                t: 2026 + seed * 10,
                i: 30 + seed * 120,
                d: 10 + seed * 50
            };
        }

        function createCard(input) {
            let key = Object.keys(DeterministicDictionary).find(k => input.includes(k));
            let data = key ? DeterministicDictionary[key] : getSeedData(input);
            
            // 更新动态场状态
            State.prob = data.p;
            State.intensity = data.i;
            State.depth = data.d;

            const card = document.createElement('div');
            card.className = `card ${data.p > 0.8 ? 'high-sync' : ''}`;
            card.innerHTML = `
                <div class="q">脉冲响应：${input}</div>
                <div class="matrix-grid">
                    <div class="m-item">坍缩概率<b>${(data.p * 100).toFixed(1)}%</b></div>
                    <div class="m-item">视界时间<b>${data.t.toFixed(1)}y</b></div>
                    <div class="m-item">脉冲强度<b>${data.i.toFixed(0)}Hz</b></div>
                    <div class="m-item">节律深度<b>${data.d.toFixed(0)}λ</b></div>
                </div>
                <div class="t">
                    <b>科学实证</b>${data.sci || "正在通过种子算法解析此脉冲的确定性。"}
                    <div class="conclusion"><b>直白定论</b>${data.con || "此节律已进入视界对齐程序。"}</div>
                </div>
            `;
            return card;
        }

        function render() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 节律联动：概率驱动流速，深度驱动复杂性
            const flowSpeed = (State.prob * 0.1 + State.res * 0.05);
            State.time += flowSpeed;

            drawWave(0.7, '#00ffcc', 1.0, 0);       
            drawWave(0.2, '#ffffff', 0.6, 2.5);     
            requestAnimationFrame(render);
        }

        function drawWave(alpha, color, scale, shift) {
            ctx.save();
            ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = 2;
            ctx.beginPath();
            const midY = canvas.height / 2;
            const amp = State.intensity * scale;
            const complexity = State.depth / 20; // 深度 λ 决定线条的毛刺感（人话：纠结程度）

            for (let x = 0; x <= canvas.width; x += 3) {
                const angle = (x * 0.01) + State.time + shift;
                const noise = Math.sin(angle * complexity) * (amp * 0.3);
                const y = midY + Math.sin(angle) * amp + noise;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke(); ctx.restore();
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(createCard(cmd.value), log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 10) log.removeChild(log.lastChild);
            }
        };
        render();
    </script>
</body>
</html>
