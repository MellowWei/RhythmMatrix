<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V24_PUBLIC</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: sans-serif; margin: 0; display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
        
        /* 侧边栏：手机端改为顶部或底部自适应 */
        #s { width: 450px; border-right: 2px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: #050505; z-index: 10; transition: all 0.3s; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        #log::-webkit-scrollbar { display: none; }
        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 15px; font-size: 16px; outline: none; border-radius: 0; }
        
        .card { border: 1px solid #333; background: rgba(10,10,10,0.9); padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--n); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .card.risk { border-left-color: var(--r); }
        .q-text { color: var(--g); font-size: 12px; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .data-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .data-item { font-size: 11px; color: #888; }
        .data-item b { color: #fff; font-size: 14px; display: block; margin-top: 2px; }
        .truth-text { font-size: 14px; line-height: 1.6; color: #ddd; border-top: 1px solid #222; padding-top: 10px; }
        
        /* 背景画布 */
        #stage { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; opacity: 0.4; }

        /* 📱 手机端适配逻辑 */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            #s { width: 100%; height: 60%; border-right: none; border-bottom: 2px solid var(--n); padding: 15px; order: 2; }
            #stage { height: 40%; order: 1; }
            .data-box { gap: 5px; }
            .data-item b { font-size: 13px; }
        }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">
    <div id="stage"><canvas id="c"></canvas></div>
    <div id="s">
        <div style="border-bottom: 2px solid var(--n); padding-bottom: 10px; margin-bottom: 15px;">
            <div style="font-weight:900; letter-spacing:3px; font-size:18px;">RAPM V24.2.1</div>
            <div style="font-size:9px; opacity:0.5; text-transform: uppercase;">Systemic Deconstruction | Public_Node</div>
        </div>
        <div id="log">
            <div style="opacity:0.4; font-size:11px;">> 逻辑纠偏程序就绪...<br>> 算法：语义权重锚定<br>> 接入终端：MOBILE_ADAPTIVE</div>
        </div>
        <input id="cmd" placeholder="输入变量、趋势或指令..." autofocus autocomplete="off" inputmode="text">
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let state = { y: 2026.0, ty: 2026.0, h: [] };

        function getVal(str, offset) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return Math.abs(Math.sin(hash * 1.482 + offset));
        }

        const logicDict = [
            { k: "金融", t: "信用体系将在 2028 年经历结构性硬着陆。旧有的资产逻辑将失效，财富将面临全球重新锚定。" },
            { k: "性别", t: "社会将转向以‘心理认同’为基础的新秩序。传统的家庭逻辑将在 2030 年前后彻底解构。" },
            { k: "身份", t: "数字化身将比肉体具备更高权重。一旦信用失效，个体将在物理世界失去所有生存权限。" },
            { k: "战争", t: "冲突转向‘资源锁死’。断网、断电或供应链劫持的破坏力将远超传统武器。" }
        ];

        function process(input) {
            const v1 = getVal(input, 1), v2 = getVal(input, 2), v3 = getVal(input, 3);
            const year = (2027.2 + v1 * 13.8).toFixed(1);
            const prob = (45 + v2 * 50).toFixed(1) + "%";
            const impact = (32 + v3 * 65).toFixed(1) + "%";
            let f = logicDict.find(item => input.includes(item.k));
            let t = f ? f.t : `该变量将在 ${year} 年对系统造成约为 ${(v1*85).toFixed(1)}% 的波动位移。`;
            let r = v2 > 0.55;

            return `<div class="card ${r?'risk':''}">
                <div class="q-text">解析：${input}</div>
                <div class="data-box">
                    <div class="data-item">节点<b>${year} 年</b></div>
                    <div class="data-item">概率<b>${prob}</b></div>
                    <div class="data-item">影响<b>${impact}</b></div>
                    <div class="data-item">风险<b>${r?'SEVERE':'NORMAL'}</b></div>
                </div>
                <div class="truth-text"><b>推演结论：</b><br>${t}</div>
            </div>`;
        }

        function loop() {
            if (state.y < state.ty) { state.y += 0.1; state.h.push({y:state.y, s:92-(state.y-2026)*3.4}); }
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
            state.h.forEach((h, i) => {
                let x = (h.y-2026)/24 * canvas.width;
                let y = canvas.height - (h.s/100 * canvas.height);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            });
            ctx.stroke(); requestAnimationFrame(loop);
        }

        cmd.onkeydown = (e) => {
            if(e.key === 'Enter' && cmd.value.trim()) {
                const val = cmd.value;
                if(val.includes("股票")) {
                    log.innerHTML = `<div class="card" style="border-left-color:var(--g)"><div class="q-text">解析：${val}</div><b style="color:var(--g)">拒绝：</b>随机噪声无结构价值。</div>` + log.innerHTML;
                } else {
                    log.innerHTML = process(val) + log.innerHTML;
                    state.ty = 2026 + getVal(val, 1) * 16;
                }
                cmd.value = '';
                if(window.innerWidth < 850) cmd.blur(); // 手机端自动收起键盘
            }
        }; loop();
    </script>
</body>
</html>
