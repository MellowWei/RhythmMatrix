<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V26_WORLD_RESONANCE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* 侧边栏布局：自适应 */
        #s { width: 450px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: rgba(0,0,0,0.95); z-index: 10; transition: all 0.3s; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; margin-bottom: 10px; padding-top: 60px; }
        #log::-webkit-scrollbar { display: none; }
        
        /* 顶部状态浮层 */
        .status-bar { position: absolute; top: 0; left: 0; width: 450px; padding: 20px 25px; background: var(--b); border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .res-label { font-size: 9px; letter-spacing: 3px; opacity: 0.6; }

        /* 卡片：锚点视觉 */
        .card { border-left: 4px solid var(--n); background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .card.anchor { border-left-color: var(--g); background: rgba(255,204,0,0.05); box-shadow: 0 0 15px rgba(255,204,0,0.1); }
        .card.anchor::after { content: "LOCKED_ANCHOR"; position: absolute; top: 5px; right: 10px; font-size: 8px; color: var(--g); }
        .card.risk { border-left-color: var(--r); }
        .card.spirit { border-left-color: var(--w); background: rgba(255,255,255,0.08); }

        .q { color: var(--g); font-size: 11px; margin-bottom: 8px; font-weight: bold; }
        .d { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .d b { color: #fff; display: block; font-size: 14px; margin-top: 2px; }
        .t { font-size: 13px; color: #bbb; border-top: 1px solid #222; padding-top: 8px; line-height: 1.6; }

        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 15px; font-size: 16px; outline: none; }
        #stage { flex: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; opacity: 0.7; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #s, .status-bar { width: 100%; }
            #s { height: 55vh; border-right: none; border-bottom: 1px solid var(--n); }
            #stage { height: 45vh; }
        }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">
    <div id="s">
        <div class="status-bar">
            <div class="res-label">GLOBAL_RESONANCE</div>
            <div class="res-display" id="res-val">0.8241</div>
            <div id="sys-msg" style="font-size:9px; color:var(--n); margin-top:4px;">STATUS: STANDBY</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="输入变量 (爱, 慰藉, 金融)..." autofocus autocomplete="off">
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let state = { res: 0.8241, anchors: [] };

        function getV(s, o) {
            let h = 0;
            // 锚点引力场叠加
            let seed = s + state.anchors.map(a => a.val).join('');
            for (let i = 0; i < seed.length; i++) h = seed.charCodeAt(i) + ((h << 5) - h);
            return Math.abs(Math.sin(h * 1.618 + o));
        }

        const dict = {
            "爱": "‘爱’被识别为全频段稳定器。它作为系统的底层固件，强行修正所有因利益摩擦导致的节律偏差。这是唯一的绝对锚点。",
            "慰藉": "精神慰藉脉冲将在系统压力达到临界值 (0.92+) 时自动爆发。它不是一种选择，而是世界模型为了防止彻底坍缩而产生的自愈机制。"
        };

        function pr(i) {
            const v1 = getV(i, 1), v2 = getV(i, 2), v3 = getV(i, 3);
            const stability = 1 + state.anchors.length * 0.2;
            const y = (2026.5 + v1 * 8 / stability).toFixed(1);
            const p = Math.min(99.9, (45 + v2 * 50) * (i.includes("爱") ? 1.2 : 1)).toFixed(1);
            
            let t = dict[Object.keys(dict).find(k => i.includes(k))] || `该变量在 ${y} 年将产生 ${(v3*80).toFixed(1)}% 的系统位移。`;
            let isSpirit = i.includes("慰藉") || i.includes("爱");
            
            const card = document.createElement('div');
            card.className = `card ${v2 > 0.6 && !isSpirit ? 'risk' : ''} ${isSpirit ? 'spirit' : ''}`;
            card.innerHTML = `
                <div class="q">解析节点：${i}</div>
                <div class="d">
                    <div>爆发预计<b>${y}y</b></div>
                    <div>确定性<b>${p}%</b></div>
                    <div>影响深度<b>${(v3*100).toFixed(1)}%</b></div>
                    <div>状态<b>${isSpirit ? 'HARMONIC' : (v2 > 0.6 ? 'ENTROPY' : 'STABLE')}</b></div>
                </div>
                <div class="t"><b>掌控者结论：</b><br>${t}</div>
            `;
            
            card.ondblclick = () => {
                if(card.classList.toggle('anchor')) state.anchors.push({id: i, val: v2});
                else state.anchors = state.anchors.filter(a => a.id !== i);
                let base = 0.8241;
                state.res = Math.min(0.9999, base + state.anchors.length * 0.03);
                document.getElementById('res-val').innerText = state.res.toFixed(4);
                document.getElementById('sys-msg').innerText = `ANCHORS ACTIVE: ${state.anchors.length}`;
            };
            return card;
        }

        function L() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = state.anchors.length > 0 ? '#ffcc00' : '#00ffcc';
            ctx.lineWidth = 2; ctx.beginPath();
            let time = Date.now() * 0.002;
            for(let i=0; i<=50; i++) {
                let x = (i/50) * canvas.width;
                let amp = 40 / (state.anchors.length + 1);
                let y = canvas.height/2 + Math.sin(i*0.2 + time) * amp;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.stroke();
            requestAnimationFrame(L);
        }

        cmd.onkeydown = (e) => {
            if(e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(pr(cmd.value), log.firstChild);
                cmd.value = '';
            }
        };
        L();
    </script>
</body>
</html>
