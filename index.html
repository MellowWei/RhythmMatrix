<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAPM_V24_MASTER_CORE</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #s { width: 550px; border-right: 1px solid var(--dim); display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; padding: 120px 25px 20px; scrollbar-width: none; }
        .status-bar { position: absolute; top: 0; width: 550px; padding: 25px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--dim); z-index: 11; backdrop-filter: blur(10px); }
        .res-display { font-size: 28px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .card { border: 1px solid var(--dim); background: #080808; padding: 20px; margin-bottom: 20px; border-left: 3px solid var(--n); }
        .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .m-box { background: #0c0c0c; padding: 10px; border: 1px solid #222; text-align: center;}
        .m-label { font-size: 10px; color: #555; margin-bottom: 5px; }
        .m-val { font-size: 16px; color: var(--w); font-weight: bold; }
        .section { margin-top: 15px; padding: 12px; font-size: 14px; line-height: 1.6; }
        .sci { color: #888; background: rgba(0,255,204,0.03); margin-bottom: 10px; font-style: italic; }
        .con { color: var(--w); background: rgba(255,204,0,0.08); font-weight: 500; border: 1px dashed var(--g); }
        #cmd-box { padding: 25px; border-top: 1px solid var(--dim); }
        #cmd { background: #0a0a0a; border: 1px solid var(--n); color: var(--w); width: 100%; padding: 15px; outline: none; font-size: 16px; }
        #stage { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-display">SYSTEM // 掌控者内核</div>
            <div style="font-size:10px; color:var(--g); opacity:0.8; letter-spacing: 2px;">V24.3 // 匿名因果强制引擎已就绪</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box"><input id="cmd" placeholder="输入国家、人物或社会变量 (如: 美国开战, 专家的话)..." autofocus autocomplete="off"></div>
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let State = { hz: 60, lambda: 20, t: 0 };

        const RULES = [
            // --- 国家与地缘政治硬化逻辑 ---
            {
                pattern: /美国|美方|USA|大选|美国开战|华盛顿/,
                t: "2027.8Y", i: 145, l: 58, p: "到嗓子眼了 (91.2%)",
                sci: "信用本位与武力投影的共振频率发生相位偏移，引发结构性震颤。",
                con: "别看现在闹得欢，2027年是个死循环。信用装不下了，武力就得往外溢，嗓子眼已经堵死了。"
            },
            {
                pattern: /中国|中方|国内|东方|大陆/,
                t: "2031.4Y", i: 110, l: 45, p: "大半瓶了 (75.4%)",
                sci: "文明重心的物理性位移已进入加速期，旧有的地缘重力场正在消散。",
                con: "重心已经开始搬家了，2031年之前是最后的旧节奏。大半瓶水都在晃荡，搬完家才是新世界。"
            },
            {
                pattern: /人物|领导|元首|统帅|核心|主席|总统/,
                t: "2029.5Y", i: 155, l: 30, p: "马上就满 (90.1%)",
                sci: "个体意志与集体节律的契合度达到物理极限，即将发生因果替代。",
                con: "个人的意志再强，也强不过周期的物理惯性。2029年是个坎，水满则溢，谁也拦不住节律的换届。"
            },
            {
                pattern: /战争|热战|冲突|打仗|导弹|蘑菇/,
                t: "2027.3Y", i: 180, l: 70, p: "就剩个缝 (95.6%)",
                sci: "旧秩序的压强达到临界值，能量必须通过动能形式进行暴力释放。",
                con: "和平的缝隙已经窄得看不见了。2027年前后，旧能量如果不喷发出来，系统就会自燃。"
            },
            // --- 社会变量硬化逻辑 ---
            {
                pattern: /家庭|婚姻|两口子|凑合|亲密/,
                t: "2028.5Y", i: 105, l: 60, p: "几乎全满 (92.4%)",
                sci: "亲密关系由社会协作协议回归至灵魂共振模型。传统结构自然解体。",
                con: "两口子死凑合的过法会大面积崩溃。关系的唯一标准是频率对不对，别的不扯淡。"
            },
            {
                pattern: /知识|科学|真理|专家|权威|教育/,
                t: "2038.2Y", i: 155, l: 65, p: "已经溢出点 (78.5%)",
                sci: "专家权威与实验实证的认知模型遭受高维干涉扇击。",
                con: "专家说的所谓真理，到时候会被外力一巴掌扇碎。真理就是你看到的，不用证明。"
            }
        ];

        function calc(input) {
            let res = RULES.find(r => r.pattern.test(input));
            if (!res) {
                res = { t: "2030.4Y", p: "变天前夜", i: 115, l: 45, sci: "全域因果重置中。", con: "旧逻辑无法解析，世界正按新频率重排。" };
            }
            State.hz = res.i; State.lambda = res.l;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="color:var(--g); font-weight:bold; font-size:12px;">脉冲响应：${input}</div>
                <div class="m-grid">
                    <div class="m-box"><div class="m-label">视界时间 (T)</div><div class="m-val">${res.t}</div></div>
                    <div class="m-box"><div class="m-label">旧秩序撑满程度</div><div class="m-val">${res.p}</div></div>
                </div>
                <div class="section sci"><b>科学实证：</b>${res.sci}</div>
                <div class="section con"><b>白话定论：</b>${res.con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function render() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 5) {
                const y = midY + Math.sin(x*0.005 + State.t) * State.hz + Math.cos(x*0.01 + State.t) * State.lambda;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke(); State.t += 0.05; requestAnimationFrame(render);
        }
        cmd.onkeydown = (e) => { if (e.key === 'Enter' && cmd.value) { calc(cmd.value); cmd.value = ''; } };
        render();
    </script>
</body>
</html>
