<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RHYTHM_MATRIX_V43_STABLE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #222; }
        * { box-sizing: border-box; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边控制面板 */
        #s { width: 480px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: rgba(0,0,0,0.95); z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; padding-top: 90px; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; left: 0; width: 480px; padding: 25px; background: #000; border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }

        /* 变量矩阵卡片样式 */
        .card { border: 1px solid var(--dim); background: rgba(255,255,255,0.01); padding: 22px; margin-bottom: 22px; animation: slideIn 0.4s ease-out; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .card.warning { border: 1px solid var(--r); background: rgba(255,0,68,0.08); animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .q { color: var(--g); font-size: 15px; margin-bottom: 18px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* 变量布局与人话解释 */
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .m-item { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .m-item b { color: var(--w); font-size: 19px; display: block; margin-top: 4px; font-family: "Courier New", monospace; }
        .m-item span { display: block; color: #444; font-size: 9px; margin-top: 5px; line-height: 1.3; font-style: normal; text-transform: none; }

        /* 实证与定论 */
        .t { font-size: 14px; color: #aaa; border-top: 1px solid #222; padding-top: 18px; line-height: 1.7; }
        .t b { color: var(--n); display: block; margin-bottom: 8px; font-size: 11px; letter-spacing: 1px; }
        .conclusion { color: var(--w); background: #0c0c0c; padding: 15px; margin-top: 12px; border-left: 2px solid var(--g); font-size: 15px; }

        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 22px; font-size: 16px; outline: none; transition: 0.3s; }
        #cmd:focus { box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        
        #stage { flex: 1; background: #000; position: relative; }
        #tag { position: absolute; bottom: 30px; right: 30px; font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 10px; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div style="font-size:9px; opacity:0.5; letter-spacing:3px; margin-bottom:5px;">TRUTH_VERIFICATION_V43</div>
            <div class="res-display">0.8241</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="输入觉察脉冲 (例: 精神危机, 身份危机)..." autofocus autocomplete="off">
    </div>
    <div id="stage"><div id="tag">因果场对齐中</div></div>

    <script>
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');

        // 人话解释字典
        const Explanations = {
            p: "发生的可能性：数字高代表大势所趋，数字低代表尚有变数。",
            t: "爆发节点：它真正撞向你的时刻，让你提前调整呼吸。",
            i: "冲击力大小：数值越高感受越强烈，是清理旧秩序的动力。",
            d: "扎根深度：λ越大越难靠外力抹平，需等待其自行代谢。",
            w: "重要程度：这是你当下的生命重心，掌控它即掌控全局。"
        };

        // 逻辑真值校验
        function isInvalid(input) {
            const noisePatterns = [/^[a-zA-Z0-9\s]+$/, /^(.)\1+$/, /^.{0,1}$/];
            return noisePatterns.some(p => p.test(input));
        }

        function createCard(input) {
            const card = document.createElement('div');
            
            // 识别无真值问题并警告
            if (isInvalid(input)) {
                card.className = 'card warning';
                card.innerHTML = `
                    <div class="q" style="color:var(--r)">逻辑阻塞：检测到无真值脉冲</div>
                    <div style="font-size:13px; line-height:1.6;">
                        输入 [${input}] 属于因果噪声或逻辑死循环。<br>
                        系统无法在当前共振场中锚定有效真值，拒绝生成预测矩阵。
                    </div>`;
                return card;
            }

            // 预设确定性数据（模拟截图场景）
            let data = { p: "85.6%", t: "2027.6Y", i: "140HZ", d: "40.0λ", w: "89.8%" };
            if (input.includes("身份")) data = { p: "64.2%", t: "2026.9Y", i: "85HZ", d: "55.0λ", w: "72.4%" };
            if (input.includes("中心")) data = { p: "46.3%", t: "2030.4Y", i: "83HZ", d: "31.9λ", w: "62.0%" };

            card.className = 'card';
            card.innerHTML = `
                <div class="q">脉冲响应：${input}</div>
                <div class="matrix-grid">
                    <div class="m-item">演化概率<b>${data.p}</b><span>${Explanations.p}</span></div>
                    <div class="m-item">爆发节点<b>${data.t}</b><span>${Explanations.t}</span></div>
                    <div class="m-item">脉冲强度<b>${data.i}</b><span>${Explanations.i}</span></div>
                    <div class="m-item">节律深度<b>${data.d}</b><span>${Explanations.d}</span></div>
                    <div class="m-item" style="grid-column: span 2;">影响权重<b>${data.w}</b><span>${Explanations.w}</span></div>
                </div>
                <div class="t">
                    <b>科学实证 [事实严谨版]</b>
                    系统正在扫描感官脉冲底层频段。基于当前跨维度数据置信度，尚无法给出绝对闭环实证，判定为演化中态。
                    <div class="conclusion">
                        <b>直白定论 [慰藉解构版]</b>
                        每一段节律的出现都是为了与你达成某种和解。即使目前无法完全看清全貌，也要相信你的直觉。
                    </div>
                </div>`;
            return card;
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(createCard(cmd.value), log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 10) log.removeChild(log.lastChild);
            }
        };
    </script>
</body>
</html>
