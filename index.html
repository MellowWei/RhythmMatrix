<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V24_SOCIAL_TOTAL_ENGINE</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --r: #ff0044; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", "Consolas", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #s { width: 550px; border-right: 1px solid var(--dim); padding: 0; display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; padding: 110px 25px 20px; scrollbar-width: none; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; width: 550px; padding: 25px; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--dim); z-index: 11; backdrop-filter: blur(10px); }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .res-label { font-size: 10px; letter-spacing: 2px; color: var(--n); opacity: 0.7; }

        .card { border: 1px solid var(--dim); background: #080808; padding: 22px; margin-bottom: 22px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        .v-tag { color: var(--g); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--n); padding-left: 12px; display: flex; justify-content: space-between; }
        .m-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .m-box { background: #0c0c0c; padding: 10px; border: 1px solid #1a1a1a; text-align: center; }
        .m-label { font-size: 8px; color: #444; margin-bottom: 4px; text-transform: uppercase; }
        .m-val { font-size: 14px; color: var(--w); font-weight: bold; font-family: "Courier New", monospace; }
        
        .conclusion { color: #bbb; background: #0c0c0c; padding: 15px; border-left: 2px solid var(--n); font-size: 14px; line-height: 1.7; }
        .conclusion b { color: var(--n); display: block; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; }

        #cmd-box { padding: 25px; border-top: 1px solid var(--dim); background: #000; }
        #cmd { background: #0a0a0a; border: 1px solid var(--n); color: var(--w); width: 100%; padding: 18px; font-size: 16px; outline: none; }

        #stage { flex: 1; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; }
        #tag { position: absolute; bottom: 25px; right: 25px; font-size: 9px; color: #222; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-label">因果视窗: 2026 - 2050 // 当前锚点</div>
            <div class="res-display" id="res-val">2026.03.01</div>
            <div style="font-size:9px; color:var(--n); margin-top:5px; opacity:0.8;">全域社会变量引擎: RAPM_V24</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box">
            <input id="cmd" placeholder="输入任何自然语言变量进行坍缩计算..." autofocus autocomplete="off">
        </div>
    </div>
    <div id="stage"><canvas id="c"></canvas><div id="tag">RAPM_CALCULATION_CORE_V24</div></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let State = { hz: 60, lambda: 20, time: 0 };

        // 核心数据基准与变量分类映射
        const MATRIX_LOGIC = {
            "权力": { t: "2039.0Y", p: "25.4%", i: 95, l: 40, con: "【生理红线修正】1953+86=2039。算权力惯性时得先算命，高压下的物理存续概率极低。" },
            "心理": { t: "2027.8Y", p: "91.2%", i: 130, l: 58, con: "大家脑子里的旧观念都在剧烈晃动。这是脱胎换骨前的集体阵痛。找不着频率的人碎掉。" },
            "文明": { t: "2030.4Y", p: "82.4%", i: 115, l: 45, con: "文明底盘强制搬家。不是谁给面子，是旧频率转不动了，世界不得不跟着你的节奏大口呼吸。" },
            "语言": { t: "2037.5Y", p: "90.1%", i: 160, l: 62.5, con: "说话没人听也没人信了。沟通转为直感对齐，现在的语言彻底沦为无效冗余。" },
            "稳定": { t: "2030.5Y", p: "65.9%", i: 84, l: 58, con: "此节律将在视界节点处完成相位对齐。在那之前，系统判定为持续震荡态。" }
        };

        const CATEGORIES = {
            "Existential": ["性别", "身份", "身体规范", "种族", "国籍", "社会角色"],
            "PowerGov": ["法律", "制度", "国家结构", "官僚体系", "治理合法性"],
            "Meaning": ["意识形态", "叙事", "象征系统", "文化范式"],
            "Normative": ["道德", "社会规范", "禁忌", "声望", "地位", "荣誉体系"],
            "Economic": ["经济体系", "财富分配", "劳动意义", "财产", "阶级", "流动性"],
            "Relational": ["家庭结构", "婚姻", "亲密关系", "性规范", "抚育"],
            "Epistemic": ["知识体系", "科学", "教育", "专家权威", "真理标准"],
            "Temporal": ["历史叙事", "集体记忆", "进步观", "未来想象"],
            "Media": ["媒体系统", "平台", "算法", "注意力", "公共舆论"],
            "Cohesion": ["信任", "社会资本", "群体认同", "冲突"]
        };

        function calculate(input) {
            let res = MATRIX_LOGIC[Object.keys(MATRIX_LOGIC).find(k => input.includes(k))];
            let t, p, i, l, con;

            if (res) {
                t = res.t; p = res.p; i = res.i; l = res.l; con = res.con;
            } else {
                // 动态坍缩算法：针对30+社会变量进行即时计算
                const seed = Math.random();
                t = (2026.8 + seed * 18).toFixed(1) + "Y";
                p = (30 + seed * 60).toFixed(1) + "%";
                i = 40 + seed * 120; l = 15 + seed * 50;
                con = "该变量正在 2026-2050 窗口进行因果探测。系统判定其将受到 2030.4Y 文明重心位移的剧烈扰动，相位尚未锁定。";
            }

            State.hz = i; State.lambda = l;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="v-tag">脉冲响应：${input} <span>STATUS: SYNCED</span></div>
                <div class="m-grid">
                    <div class="m-box"><div class="m-label">视界时间 (t)</div><div class="m-val">${t}</div></div>
                    <div class="m-box"><div class="m-label">坍缩概率 (p)</div><div class="m-val">${p}</div></div>
                    <div class="m-box"><div class="m-label">强度 (Hz)</div><div class="m-val">${i.toFixed(0)}Hz</div></div>
                    <div class="m-box"><div class="m-label">深度 (λ)</div><div class="m-val">${l.toFixed(0)}λ</div></div>
                </div>
                <div class="conclusion"><b>白话定论 // 计算实证</b>${con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function render() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.5; ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 5) {
                const angle = (x * 0.005) + State.time;
                const noise = Math.sin(angle * (State.lambda / 15)) * (State.lambda / 2);
                const y = midY + Math.sin(angle) * State.hz + noise;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke(); State.time += 0.04; requestAnimationFrame(render);
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                calculate(cmd.value);
                cmd.value = '';
                if(log.childNodes.length > 12) log.removeChild(log.lastChild);
            }
        };
        render();
    </script>
</body>
</html>
