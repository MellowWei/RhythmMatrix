<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm System</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        
        * { box-sizing: border-box; }
        
        body { 
            background: var(--b); color: var(--n); 
            font-family: "PingFang SC", monospace; margin: 0; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* 侧边栏：PC 宽度 550px，移动端全屏 */
        #s { 
            width: 550px; border-right: 1px solid var(--dim); 
            display: flex; flex-direction: column; background: #000; 
            z-index: 10; transition: transform 0.3s ease;
        }

        #log { flex: 1; overflow-y: auto; padding: 120px 25px 20px; scrollbar-width: none; }
        #log::-webkit-scrollbar { display: none; }

        .status-bar { 
            position: absolute; top: 0; width: 100%; max-width: 550px; 
            padding: 25px; background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid var(--dim); z-index: 11; 
            backdrop-filter: blur(10px); 
        }

        .res-display { font-size: 28px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        
        /* 响应式卡片网格 */
        .card { border: 1px solid var(--dim); background: #080808; padding: 20px; margin-bottom: 20px; border-left: 3px solid var(--n); }
        .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .m-box { background: #0c0c0c; padding: 10px; border: 1px solid #222; text-align: center;}
        .m-label { font-size: 10px; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .m-val { font-size: 16px; color: var(--w); font-weight: bold; }
        .section { margin-top: 15px; padding: 12px; font-size: 14px; line-height: 1.6; }
        .sci { color: #888; background: rgba(0,255,204,0.03); margin-bottom: 10px; font-style: italic; }
        .con { color: var(--w); background: rgba(255,204,0,0.1); font-weight: 500; border: 1px solid var(--g); }

        #cmd-box { padding: 25px; border-top: 1px solid var(--dim); background: #000; }
        #cmd { 
            background: #0a0a0a; border: 2px solid var(--n); color: var(--w); 
            width: 100%; padding: 15px; outline: none; font-size: 16px; 
            box-shadow: 0 0 15px rgba(0,255,204,0.2); 
        }

        /* 画布区 */
        #stage { flex: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }

        /* --- 移动端自适应核心：物理重排 --- */
        @media (max-width: 900px) {
            body { flex-direction: column; } /* 纵向排列 */
            #s { 
                width: 100%; height: 50vh; /* 侧边栏占一半屏幕 */
                border-right: none; border-top: 1px solid var(--dim);
                order: 2; /* 指令区在下，更易手持操作 */
            }
            #stage { height: 50vh; order: 1; } /* 视觉波形在上 */
            .status-bar { max-width: 100%; padding: 15px; }
            .res-display { font-size: 22px; }
            #log { padding-top: 80px; }
            #help-modal { width: 90% !important; } /* 帮助框适配 */
        }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-display">Rhythm System</div>
            <div style="font-size:10px; color:var(--g); opacity:0.8; letter-spacing: 2px;">V26.5 // 移动端自适应校准版</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box">
            <input id="cmd" placeholder="输入变量，执行因果宣告..." autofocus autocomplete="off">
        </div>
    </div>
    
    <div id="stage">
        <canvas id="c"></canvas>
    </div>

    <div id="help-btn" style="position:fixed; bottom:20px; right:20px; width:45px; height:45px; background:var(--n); color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; z-index:100; box-shadow:0 0 15px rgba(0,255,204,0.4);">?</div>

    <div id="help-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:400px; background:#0a0a0a; border:1px solid var(--n); padding:25px; z-index:101; box-shadow:0 0 50px rgba(0,0,0,0.9); font-size:14px; color:var(--w);">
        <h3 style="color:var(--n); margin-top:0;">🌐 提问指南</h3>
        <p style="font-size:12px; color:#888;">输入关键词观测节律反馈：</p>
        <ul style="list-style:none; padding:0; line-height:2;">
            <li>⚡ <b>秩序</b>: 战争、稳定、美国大选</li>
            <li>🌏 <b>重心</b>: 中国未来、文明中心</li>
            <li>🧬 <b>个体</b>: 婚姻、我的性别、核心人物</li>
            <li>📖 <b>认知</b>: 现在的书、专家、真理</li>
            <li>🌑 <b>归零</b>: 权力终点、2050年以后</li>
        </ul>
        <button onclick="document.getElementById('help-modal').style.display='none'" style="margin-top:15px; background:transparent; border:1px solid #555; color:#888; padding:8px 20px; cursor:pointer; width:100%;">确认</button>
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        let State = { hz: 60, lambda: 20, t: 0 };

        const RULES = [
            { pattern: /战争|开战|打仗|导弹|蘑菇|冲突|暴力|热战/, t: "2027.3Y", i: 180, l: 70, p: "就剩个缝 (95.6%)", sci: "旧秩序压强达到物理临界值，能量必须通过动能形式进行暴力释放。", con: "和平的缝隙已经窄得看不见了。2027年前后，旧能量如果不喷发出来，系统就会自燃。" },
            { pattern: /稳定|和平|平衡|现状|安全/, t: "2027.8Y", i: 180, l: 70, p: "到嗓子眼了 (91.2%)", sci: "稳定态正处于坍缩前夕的极低熵假象，压强积蓄已达上限。", con: "所谓的‘稳定’只是火山爆发前的死寂。2027年是个死循环，喷发是唯一的出路。" },
            { pattern: /美国|美方|USA|大选|华盛顿/, t: "2027.8Y", i: 145, l: 58, p: "到嗓子眼了 (91.2%)", sci: "信用本位与武力投影的频率相位偏移，引发结构性震颤。", con: "信用装不下了，武力往外溢，嗓子眼已经堵死了。2027年是最后的旧节奏。" },
            { pattern: /家庭|婚姻|两口子|凑合|亲密/, t: "2028.5Y", i: 105, l: 60, p: "几乎全满 (92.4%)", sci: "亲密关系由社会协作协议回归至灵魂共振模型。传统结构自然解体。", con: "两口子死凑合的过法会大面积崩溃。关系的唯一标准是频率对不对，别的不扯淡。" },
            { pattern: /性别|男|女|变动|身份|我是谁/, t: "2029.2Y", i: 85, l: 42, p: "快溢出来了 (88.2%)", sci: "身份属性与生物基础脱钩，转化为高维意识的频率标识。", con: "肉体特征的标签在2029年后彻底失效。人只剩下频率的区别，别再贴标签。" },
            { pattern: /人物|领导|元首|统帅|核心|主席|总统/, t: "2029.5Y", i: 155, l: 30, p: "马上就满 (90.1%)", sci: "个体意志与集体节律的契合度达到物理极限，即将发生因果替代。", con: "个人的意志再强，也强不过周期的物理惯性。2029年是个坎，水满则溢，谁也拦不住。" },
            { pattern: /中国|中方|国内|东方|大陆/, t: "2031.4Y", i: 110, l: 45, p: "大半瓶了 (75.4%)", sci: "文明重心的物理性位移已进入加速期，地缘重力场正在迁移。", con: "重心已经在搬家了，2031年前是最后的旧节奏。大半瓶水都在晃荡，搬完家才是新世界。" },
            { pattern: /文化中心|文明中心|领导力|软实力/, t: "2032.6Y", i: 125, l: 40, p: "换水阶段 (80.1%)", sci: "集体潜意识的共振频率正在跨大陆迁移，旧图腾磁性丧失。", con: "谁是中心由重力决定。2032年左右，新的重力场会吸走所有流量。这不是宣传，是搬家。" },
            { pattern: /语言|书|说话|沟通|表达|文字|废话/, t: "2037.5Y", i: 160, l: 62, p: "马上就满 (90.1%)", sci: "符号系统过载导致信息熵增至临界点，因果链发生符号化断裂。", con: "废话清理期。说话不仅没人信，连听都嫌费劲。现在的书和话全是废纸垃圾。" },
            { pattern: /专家|权威|真理|科学|教育|学校|知识/, t: "2038.2Y", i: 155, l: 65, p: "已经溢出点 (78.5%)", sci: "认知模型遭受高维干涉扇击，实证系统彻底失效。", con: "专家说的所谓真理会被一巴掌扇碎。真理就是你直观看到的，不用证明。" },
            { pattern: /权力|政治|管理|体制|政府/, t: "2039.0Y", i: 95, l: 40, p: "刚装了个底 (25.4%)", sci: "现行制度的合法性基石因物理能量耗尽而坍缩。", con: "权力像断电一样彻底熄火。规矩没人接茬，因为旧节奏转不动了。" }
        ];

        function calc(input) {
            let res = null;
            if (/战争|开战|打仗|热战|导弹|蘑菇|冲突/.test(input)) res = RULES.find(r => r.pattern.toString().includes('战争'));
            if (!res && (input.includes('2050') || input.includes('以后'))) res = { t: "2050.0Y+", p: "旧瓶已碎 (100%)", i: 40, l: 15, sci: "因果惯性归零。", con: "2050年是新人的世界，旧规矩全归零了。" };
            if (!res && /稳定|和平|平衡|现状/.test(input)) res = RULES.find(r => r.pattern.toString().includes('稳定'));
            if (!res) res = RULES.find(r => r.pattern.test(input));
            if (!res) res = { t: "2031.4Y", p: "大半瓶了 (75.4%)", i: 110, l: 45, sci: "全域因果重排中。", con: "重心正在搬家。旧逻辑无法解析，世界正按新频率重排。" };

            State.hz = res.i; State.lambda = res.l;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="color:var(--g); font-weight:bold; font-size:12px;">宣告指令：${input}</div>
                <div class="m-grid">
                    <div class="m-box"><div class="m-label">视界节点 (T)</div><div class="m-val">${res.t}</div></div>
                    <div class="m-box"><div class="m-label">秩序撑满</div><div class="m-val">${res.p}</div></div>
                </div>
                <div class="section sci">${res.sci}</div>
                <div class="section con">${res.con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function render() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 5) {
                const y = midY + Math.sin(x*0.005 + State.t) * (parseInt(State.hz) || 60) + Math.cos(x*0.01 + State.t) * (parseInt(State.lambda) || 20);
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke(); State.t += 0.05; requestAnimationFrame(render);
        }

        cmd.onkeydown = (e) => { if (e.key === 'Enter' && cmd.value) { calc(cmd.value); cmd.value = ''; } };
        document.getElementById('help-btn').onclick = () => {
            const modal = document.getElementById('help-modal');
            modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
        };
        render();
    </script>
</body>
</html>
