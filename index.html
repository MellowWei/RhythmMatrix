<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V24_PREDICTOR_CORE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: "Consolas", "PingFang SC", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #s { width: 500px; border-right: 1px solid var(--dim); padding: 0; display: flex; flex-direction: column; background: #000; z-index: 10; }
        #log { flex: 1; overflow-y: auto; padding: 100px 25px 20px; scrollbar-width: none; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; width: 500px; padding: 25px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--dim); z-index: 11; backdrop-filter: blur(10px); }
        .res-display { font-size: 38px; font-weight: 900; color: var(--w); letter-spacing: -1px; }
        .res-label { font-size: 10px; letter-spacing: 2px; color: var(--n); opacity: 0.7; }

        .card { border: 1px solid var(--dim); background: #080808; padding: 20px; margin-bottom: 20px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        .q { color: var(--g); font-size: 13px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .m-item { font-size: 9px; color: #555; text-transform: uppercase; }
        .m-item b { color: var(--w); font-size: 15px; display: block; margin-top: 2px; }
        
        .conclusion { color: var(--w); background: #111; padding: 15px; border-left: 3px solid var(--n); font-size: 14px; line-height: 1.6; }
        .conclusion b { color: var(--n); display: block; margin-bottom: 5px; font-size: 10px; }

        #cmd-box { padding: 20px; border-top: 1px solid var(--dim); background: #000; }
        #cmd { background: #0a0a0a; border: 1px solid var(--dim); color: var(--w); width: 100%; padding: 15px; font-size: 16px; outline: none; }
        #cmd:focus { border-color: var(--n); }

        #stage { flex: 1; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; }
        #tag { position: absolute; bottom: 20px; right: 20px; font-size: 9px; color: #333; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-label">TIMELINE_WINDOW: 2026 - 2050</div>
            <div class="res-display" id="res-val">2026.03.01</div>
            <div id="status-text" style="font-size:9px; color:var(--r); margin-top:5px;">SYSTEM_STATUS: ANCHOR_LOCKED</div>
        </div>
        <div id="log"></div>
        <div id="cmd-box">
            <input id="cmd" placeholder="输入变量 (例: 权力, 生理红线, 2037语言)..." autofocus autocomplete="off">
        </div>
    </div>
    <div id="stage">
        <canvas id="c"></canvas>
        <div id="tag">因果计算引擎 V24.2</div>
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        
        let EngineState = { hz: 60, lambda: 20, time: 0, res: 2026.0301 };

        // 核心因果数据库：基于 11 张截图基点
        const MATRIX_DB = [
            { k: "权力", q: "习近平连任计算", p_base: 0.801, t: "2039.0Y", i: 95, d: 40, bio_ref: 1953, con: "【生理红线修正】86岁生理极限拦截。算权力前先算命。物理坍缩概率极高，在那之前能量会耗尽。" },
            { k: "心理", q: "世界心理危机爆发", p_base: 0.912, t: "2027.8Y", i: 130, d: 58, con: "集体脱壳期。旧观念脱落引发高频阵痛。找不着自己频率的人会直接碎掉。" },
            { k: "文化", q: "中国文化中心位移", p_base: 0.824, t: "2030.4Y", i: 115, d: 45, con: "底盘搬家。重心到了，世界不得不按你的节奏呼吸。2030年后重心位移不可逆。" },
            { k: "语言", q: "人类语言危机坍缩", p_base: 0.901, t: "2037.5Y", i: 160, d: 62, con: "说话没人听了。沟通转为‘直感对齐’。现有语言沦为无效冗余，动动念头对方就能感知。" },
            { k: "干涉", q: "高维干涉/外星文明", p_base: 0.785, t: "2038.2Y", i: 155, d: 65, con: "邻居敲门。认知被物理性扇一巴掌。高频段位接入，现有科学常识彻底报废。" }
        ];

        function calculate(input) {
            let m = MATRIX_DB.find(x => input.includes(x.k));
            let p, t, i, d, con;

            if (m) {
                t = m.t; i = m.i; d = m.d;
                // 生理衰减核心算法
                if (m.bio_ref) {
                    const ageAtTarget = 2039 - m.bio_ref;
                    const decay = Math.pow(0.5, (ageAtTarget - 75) / 6);
                    p = (m.p_base * decay * 100).toFixed(1) + "%";
                } else {
                    p = (m.p_base * 100).toFixed(1) + "%";
                }
                con = m.con;
            } else {
                p = (Math.random() * 50 + 20).toFixed(1) + "%";
                t = (2026 + Math.random() * 24).toFixed(1) + "Y";
                i = 40 + Math.random() * 100;
                d = 10 + Math.random() * 50;
                con = "正在探测此扰动在 2026-2050 视窗内的相位落点。";
            }

            EngineState.hz = i;
            EngineState.lambda = d;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="q">因果坍缩：${input}</div>
                <div class="matrix-grid">
                    <div class="m-item">演化概率<b>${p}</b></div>
                    <div class="m-item">爆发节点<b>${t}</b></div>
                    <div class="m-item">脉冲强度<b>${i.toFixed(0)}Hz</b></div>
                    <div class="m-item">节律深度<b>${d.toFixed(0)}λ</b></div>
                </div>
                <div class="conclusion"><b>白话定论</b>${con}</div>
            `;
            log.insertBefore(card, log.firstChild);
        }

        function draw() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.5;
            ctx.beginPath();
            const midY = canvas.height / 2;
            for (let x = 0; x <= canvas.width; x += 4) {
                const angle = (x * 0.005) + EngineState.time;
                const noise = Math.sin(angle * (EngineState.lambda/15)) * 40;
                const y = midY + Math.sin(angle) * EngineState.hz + noise;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            EngineState.time += 0.04;
            requestAnimationFrame(draw);
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                calculate(cmd.value);
                cmd.value = '';
                if(log.childNodes.length > 8) log.removeChild(log.lastChild);
            }
        };

        draw();
    </script>
</body>
</html>
