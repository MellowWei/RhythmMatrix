<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM_V36_COLLAPSE_CORE</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        
        /* 侧边分析区 */
        #s { width: 450px; border-right: 1px solid var(--n); padding: 25px; display: flex; flex-direction: column; background: rgba(0,0,0,0.98); z-index: 10; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; margin-bottom: 10px; padding-top: 80px; }
        #log::-webkit-scrollbar { display: none; }
        
        .status-bar { position: absolute; top: 0; left: 0; width: 450px; padding: 20px 25px; background: #000; border-bottom: 1px solid var(--dim); z-index: 11; }
        .res-display { font-size: 42px; font-weight: 900; color: var(--w); letter-spacing: -2px; }
        .res-label { font-size: 9px; letter-spacing: 3px; opacity: 0.5; }

        /* 节律响应卡片 */
        .card { border: 1px solid var(--dim); background: rgba(255,255,255,0.01); padding: 22px; margin-bottom: 22px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); animation: f 0.6s ease-out; }
        @keyframes f { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        .card.spirit { border-left: 4px solid var(--w); background: rgba(255,255,255,0.04); }
        .card.anchor { border-color: var(--g); background: rgba(255,204,0,0.06); box-shadow: 0 0 30px rgba(255,204,0,0.1); }

        .q { color: var(--g); font-size: 14px; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; letter-spacing: 1px; }
        .d { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; font-size: 11px; color: #666; }
        .d b { color: var(--w); font-size: 18px; display: block; margin-top: 2px; }
        
        .t { font-size: 14px; color: #bbb; border-top: 1px solid #222; padding-top: 15px; line-height: 1.8; }
        .t b { color: var(--n); display: block; margin-bottom: 10px; font-size: 10px; letter-spacing: 2px; opacity: 0.8; }
        .conclusion { color: var(--w); background: #0a0a0a; padding: 15px; margin-top: 12px; border-left: 2px solid var(--n); font-size: 15px; letter-spacing: 0.5px; }

        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 20px; font-size: 17px; outline: none; transition: 0.4s; }
        #cmd:focus { box-shadow: 0 0 25px rgba(0,255,204,0.15); border-color: var(--w); }

        /* 动态节律区 */
        #stage { flex: 1; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; position: absolute; }
        #matrix-info { z-index: 5; color: rgba(255,255,255,0.1); font-size: 10px; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #s, .status-bar { width: 100%; }
            #s { height: 65vh; border-right: none; }
            #stage { height: 35vh; }
        }
    </style>
</head>
<body>
    <div id="s">
        <div class="status-bar">
            <div class="res-label">GLOBAL_RESONANCE</div>
            <div class="res-display" id="res-val">0.8241</div>
            <div style="font-size:9px; color:var(--n); margin-top:4px; font-weight:bold;">PHASE: COLLAPSE_ENG_V36 // WEI_JUERAN</div>
        </div>
        <div id="log"></div>
        <input id="cmd" placeholder="注入脉冲 (例: 精神危机, 孤独, 爱)..." autofocus autocomplete="off">
    </div>
    <div id="stage">
        <canvas id="c"></canvas>
        <div id="matrix-info">因果场对齐中</div>
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');
        
        let State = {
            res: 0.8241,
            freq: 0.1,    // 基础频率
            target: 0.1,  // 目标频率（平滑过渡用）
            amp: 20,      // 基础振幅
            targetAmp: 20,
            time: 0,
            anchors: 0
        };

        const RhythmDictionary = [
            { k: "精神危机", sci: "生物神经节律与数字化高频脉冲相位失配，导致感官系统进入强制熔断态。", con: "这是旧逻辑波形的终结。在2027年视界节点，新秩序将直接坍缩。目前的混乱并非故障，而是高频共振前的相位对齐。" },
            { k: "焦虑", sci: "视界超前坍缩引起的相位抖动，预测算法在虚空频段发生空转。", con: "结局早已锁定在视界尽头，过程中的振幅偏离不具备任何因果效力。闭合多余感官，感受频率的绝对静止。" },
            { k: "爱", sci: "全域最强相干协议，可强行抹平一切非线性熵增产生的杂讯。", con: "此频段为视界内唯一的永恒锚点。锁死它，外界所有干扰波将自动发生相位抵消，你的因果场将呈现绝对的平滑。" },
            { k: "孤独", sci: "高频段位下，感官节点呈现出的非均匀稀疏分布现象。", con: "高频共振必然导致与低频群落的脱节。你感到的空虚，实质上是更高维度节律降临前的真空占位。" }
        ];

        function processPulse(input) {
            const seed = Math.random();
            let match = RhythmDictionary.find(x => input.includes(x.k));
            
            // 动力学反馈：调整波形目标
            State.target = match ? 0.8 : (0.1 + seed * 0.4);
            State.targetAmp = match ? 120 : (30 + seed * 50);

            let sContent = match ? match.sci : "正在探测此脉冲在全域场中的干涉深度。";
            let cContent = match ? match.con : `此脉冲将在 ${(2026.5 + seed * 5).toFixed(1)} 年视界处完成最终的相位对齐。`;

            const card = document.createElement('div');
            card.className = `card ${match ? 'spirit' : ''}`;
            card.innerHTML = `
                <div class="q">脉冲：${input}</div>
                <div class="d">
                    <div>共振频率<b>${(State.target * 100).toFixed(1)}Hz</b></div>
                    <div>视界节点<b>${(2026.5 + seed * 5).toFixed(1)}y</b></div>
                </div>
                <div class="t">
                    <b>科学实证</b>${sContent}
                    <div class="conclusion"><b>直白定论</b>${cContent}</div>
                </div>
            `;

            card.ondblclick = () => {
                card.classList.toggle('anchor');
                State.anchors = document.querySelectorAll('.anchor').length;
                State.res = Math.min(0.9999, 0.8241 + (State.anchors * 0.04));
                document.getElementById('res-val').innerText = State.res.toFixed(4);
                document.getElementById('matrix-info').innerText = State.res > 0.9 ? "乾元大成" : "视界对齐";
            };
            return card;
        }

        // 节律渲染循环
        function run() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 物理平滑：让波形变化具有惯性
            State.freq += (State.target - State.freq) * 0.08;
            State.amp += (State.targetAmp - State.amp) * 0.08;
            
            // 运行时间受全局共振和脉冲频率双重驱动
            const flowRate = (State.res * 0.4 + State.freq * 0.6) * 0.15;
            State.time += flowRate;

            // 绘制三层复合相干波
            draw(0.8, '#00ffcc', 1.0, 0);       // 主频场
            draw(0.3, '#ffffff', 0.6, 2.0);     // 谐波场
            if(State.res > 0.9) draw(0.4, '#ffcc00', 0.4, 4.0); // 锚定场

            requestAnimationFrame(run);
        }

        function draw(alpha, color, scale, shift) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            
            const midY = canvas.height / 2;
            const currentAmp = State.amp * scale;

            for (let x = 0; x <= canvas.width; x += 4) {
                // 非线性波动方程：复合正弦 + 二次谐波
                const angle = (x * 0.012) + State.time + shift;
                const harmonic = Math.cos(angle * 0.5) * (currentAmp * 0.3);
                const y = midY + Math.sin(angle) * currentAmp + harmonic;
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(processPulse(cmd.value), log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 15) log.removeChild(log.lastChild);
            }
        };

        run();
    </script>
</body>
</html>
