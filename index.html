<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAPM_V24_PLAIN_TRUTH</title>
    <style>
        :root { --n: #00ffcc; --r: #ff0044; --g: #ffcc00; --b: #050505; --w: #ffffff; --dim: #1a1a1a; }
        * { box-sizing: border-box; cursor: crosshair; }
        body { background: var(--b); color: var(--n); font-family: "PingFang SC", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #s { width: 520px; border-right: 1px solid var(--n); padding: 30px; display: flex; flex-direction: column; background: rgba(0,0,0,0.98); z-index: 10; }
        #log { flex: 1; overflow-y: auto; scrollbar-width: none; padding-top: 80px; }
        #log::-webkit-scrollbar { display: none; }
        
        .header { position: absolute; top: 0; left: 0; width: 520px; padding: 30px; background: #000; z-index: 11; border-bottom: 1px solid #111; }
        .v-tag { font-size: 22px; font-weight: 900; color: var(--n); letter-spacing: 2px; }

        .card { background: transparent; padding: 0 0 40px 0; margin-bottom: 40px; border-bottom: 1px solid #222; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .q-title { color: var(--g); font-size: 18px; font-weight: bold; margin-bottom: 25px; }
        .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        
        .m-item { font-size: 11px; color: #555; letter-spacing: 1px; }
        .m-item b { color: var(--w); font-size: 28px; display: block; margin-top: 8px; font-family: "Courier New", monospace; letter-spacing: -1px; }
        .m-item span { display: block; margin-top: 8px; color: #666; font-size: 11px; line-height: 1.4; }

        .sci-sec h4 { color: var(--n); font-size: 14px; margin-bottom: 15px; letter-spacing: 1px; }
        .sci-text { color: #888; font-size: 15px; line-height: 1.8; margin-bottom: 20px; }
        
        .verdict-box { border-left: 3px solid var(--g); background: rgba(255, 204, 0, 0.03); padding: 20px; }
        .verdict-text { color: var(--w); font-size: 16px; line-height: 1.6; }

        #cmd-area { padding: 20px 0; }
        #cmd { background: #000; border: 1px solid var(--n); color: #fff; width: 100%; padding: 20px; font-size: 16px; outline: none; }
        
        #stage { flex: 1; background: #000; position: relative; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="s">
        <div class="header"><div class="v-tag">RAPM V24.2 // 掌控者视窗</div></div>
        <div id="log"></div>
        <div id="cmd-area"><input id="cmd" placeholder="输入你想看透的脉冲..." autofocus autocomplete="off"></div>
    </div>
    <div id="stage"><canvas id="c"></canvas></div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd'), log = document.getElementById('log');

        let State = { p: 0.761, i: 140, time: 0, targetI: 140 };

        // 核心归纳：所有复杂指标的白话定义
        const EXPLAIN = {
            t: "这件事真正撞向你的时刻，提醒你提前调整呼吸频率。",
            p: "数字高代表大势所趋，数字低代表目前尚有变数。",
            i: "冲击力大小：数值越高感受越强烈，是清理旧秩序的动力。",
            d: "扎根深度：λ越大越难靠外力抹平，需等待其自行代谢。",
            w: "重要程度：这是你当下的生命重心，掌控它即掌控全局。"
        };

        const DATA = {
            "性别": { p: "76.1%", t: "2039.9年", i: "140HZ", d: "54.1%", w: "SEVERE", sci: "生理性别和社会分类正在彻底解构，未来人们只看心理认同和功能属性。", con: "别再用男女去分类世界，新的契约时代已经开始了。" },
            "心理危机": { p: "60%", t: "探测中", i: "92HZ", d: "20λ", w: "MID", sci: "大家的心态都在剧烈晃动，这是文明脱壳前的集体阵痛。", con: "每一段节律都是为了与你和解，心理变动是觉醒的开始。" },
            "外星人": { p: "60%", t: "未来点", i: "75HZ", d: "20λ", w: "50%", sci: "目前的因果链还没闭合，但高维干涉的脉冲已经在扫了。", con: "宇宙从未抛弃过任何一个觉察者。别怕，保持觉察。" },
            "连任": { p: "60%", t: "未来点", i: "75HZ", d: "20λ", w: "50%", sci: "现在的权力逻辑还在按惯性震荡，未来正在成型。", con: "只要看清了节律，剩下的就是等待它坍缩成现实。" }
        };

        function createCard(input) {
            const entry = Object.keys(DATA).find(k => input.includes(k));
            const d = entry ? DATA[entry] : { p: "60%", t: "探测中", i: "75HZ", d: "20λ", w: "MID", sci: "新脉冲挂载，系统正在扫描底层频段。", con: "新节律已录入。相信你的直觉。" };
            
            State.targetI = parseInt(d.i) || 75;
            State.p = parseFloat(d.p) / 100 || 0.6;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="q-title">脉冲响应：${input}</div>
                <div class="matrix">
                    <div class="m-item">爆发节点<b>${d.t}</b><span>${EXPLAIN.t}</span></div>
                    <div class="m-item">演化概率<b>${d.p}</b><span>${EXPLAIN.p}</span></div>
                    <div class="m-item">脉冲强度<b>${d.i}</b><span>${EXPLAIN.i}</span></div>
                    <div class="m-item">节律深度<b>${d.d}</b><span>${EXPLAIN.d}</span></div>
                    <div class="m-item" style="grid-column: span 2;">影响权重<b>${d.w}</b><span>${EXPLAIN.w}</span></div>
                </div>
                <div class="sci-sec">
                    <h4>科学实证 [事实严谨版]</h4>
                    <div class="sci-text">${d.sci}</div>
                    <div class="verdict-box">
                        <div class="verdict-text"><b>直白定论：</b>${d.con}</div>
                    </div>
                </div>`;
            return card;
        }

        function draw() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            State.i += (State.targetI - State.i) * 0.05;
            State.time += 0.02 + (State.p * 0.05);
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 1.5; ctx.beginPath();
            for (let x = 0; x < canvas.width; x += 5) {
                const y = canvas.height / 2 + Math.sin(x * 0.005 + State.time) * State.i * Math.sin(x * 0.002 + State.time * 0.3);
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            requestAnimationFrame(draw);
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value.trim()) {
                log.insertBefore(createCard(cmd.value), log.firstChild);
                cmd.value = '';
                if(log.childNodes.length > 5) log.removeChild(log.lastChild);
            }
        };
        draw();
    </script>
</body>
</html>
