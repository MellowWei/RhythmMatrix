<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAPM_DYNAMIC_ENGINE_V24</title>
    <style>
        :root { --n: #00ffcc; --g: #ffcc00; --r: #ff0044; --b: #000; --w: #fff; }
        body { background: var(--b); color: var(--w); font-family: "Fira Code", monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 计算内核左屏 */
        #kernel { width: 50%; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        #monitor { flex: 1; background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; overflow-y: auto; padding: 15px; font-size: 12px; color: #666; }
        .log-ok { color: var(--n); }
        .log-warn { color: var(--g); }
        .log-crit { color: var(--r); font-weight: bold; }
        
        /* 输入波形右屏 */
        #wave-panel { flex: 1; position: relative; display: flex; flex-direction: column; }
        canvas { flex: 1; width: 100%; filter: drop-shadow(0 0 10px var(--n)); }
        
        #input-area { height: 80px; background: #050505; border-top: 1px solid var(--n); padding: 10px; display: flex; align-items: center; }
        #cmd { background: transparent; border: none; color: var(--w); flex: 1; font-size: 20px; outline: none; margin-left: 15px; }
        .prompt { color: var(--n); font-weight: bold; }
    </style>
</head>
<body>
    <div id="kernel">
        <div style="color:var(--n); margin-bottom:10px;">> RAPM_CORE_V24.2 // 魏珏然专用计算系统</div>
        <div id="monitor"></div>
    </div>
    
    <div id="wave-panel">
        <canvas id="c"></canvas>
        <div id="input-area">
            <span class="prompt">WEIW_INPUT_Hz_λ:</span>
            <input id="cmd" placeholder="输入语言感、生理寿命或文明重心变量..." autofocus>
        </div>
    </div>

    <script>
        const monitor = document.getElementById('monitor');
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const cmd = document.getElementById('cmd');

        // 1. 全量挂载 11 张截图基点参数
        const CORES = {
            POWER: { name: "习近平连任", target_y: 2039.0, p: 0.801, hz: 95, lambda: 40, bio_ref: 1953 },
            PSYCH: { name: "心理危机", target_y: 2027.8, p: 0.912, hz: 130, lambda: 58 },
            CIVIC: { name: "文化中心", target_y: 2030.4, p: 0.824, hz: 115, lambda: 45 },
            LINGU: { name: "语言危机", target_y: 2037.5, p: 0.901, hz: 160, lambda: 62.5 },
            EXTRA: { name: "高维干涉", target_y: 2038.2, p: 0.785, hz: 155, lambda: 65 }
        };

        let currentHz = 75, currentLambda = 20, time = 0;

        function log(msg, type='ok') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            monitor.appendChild(div);
            monitor.scrollTop = monitor.scrollHeight;
        }

        // 核心计算函数：计算输入变量对基点的坍缩影响
        function calculateCollapse(input) {
            log(`正在计算输入脉冲: "${input}"`, 'warn');
            
            // A. 生理红线计算算法
            const currentYear = 2026;
            const bioAge = currentYear - CORES.POWER.bio_ref;
            const targetAge = CORES.POWER.target_y - CORES.POWER.bio_ref; // 86岁
            
            log(`检测到生理常数: 目标 2039Y 年龄 = ${targetAge} 岁。`, 'ok');
            if (targetAge >= 85) {
                const bioDecay = Math.pow(0.5, (targetAge - 75) / 5); // 每5年概率减半
                const realP = (CORES.POWER.p * bioDecay * 100).toFixed(2);
                log(`生理红线警告：86岁生理极限导致权力存续概率坍缩至 ${realP}%`, 'crit');
            }

            // B. 语言感/语言危机计算
            if (input.includes("语言")) {
                currentHz = CORES.LINGU.hz;
                currentLambda = CORES.LINGU.lambda;
                log(`语言感参数加载：当前计算频率提升至 ${currentHz}Hz`, 'ok');
                log(`白话实证：说话没人听也没人信了。2037.5Y 沟通将彻底转为直感对齐。`, 'warn');
            }

            // C. 心理危机联动计算
            if (currentHz > 120) {
                log(`高频震荡引发集体心理脱壳，2027.8Y 心理危机爆发概率上升至 95%+`, 'crit');
                log(`定论：找不着自己频率的人会直接碎掉。`, 'warn');
            }
        }

        // 绘图循环：展现物理波形的实时干扰
        function draw() {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2;
            ctx.beginPath();
            for(let x=0; x<canvas.width; x+=2) {
                // 计算复合波形：基频 + 语言感干扰 + 生理衰减
                const base = Math.sin(x * 0.01 + time) * currentHz;
                const harmonic = Math.cos(x * 0.02 - time * 0.5) * (currentLambda / 2);
                const y = canvas.height/2 + base + harmonic;
                x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke();
            time += 0.05;
            requestAnimationFrame(draw);
        }

        cmd.onkeydown = (e) => {
            if (e.key === 'Enter' && cmd.value) {
                calculateCollapse(cmd.value);
                cmd.value = '';
            }
        };

        log("系统内核已初始化，等待魏珏然指令...", "ok");
        draw();
    </script>
</body>
</html>
