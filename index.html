<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPM Terminal V40 | 世界模型控制台</title>
    <style>
        :root { --p-green: #00ff9d; --p-red: #ff4d4d; --bg: #050505; --dim: #444; }
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { margin: 0; background: var(--bg); color: var(--p-green); overflow-x: hidden; }

        /* 全局框架：手机自适应 */
        .world-shell { display: flex; flex-direction: column; min-height: 100vh; padding: 20px; }
        .header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 30px; border: 1px solid var(--dim); padding: 15px; }

        /* 数值显示 */
        .stat-box { min-width: 200px; margin-bottom: 10px; }
        .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; }
        .stat-val { font-size: 32px; font-weight: bold; }

        /* 变量控制区：双击锁定为锚点 */
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; flex: 1; }
        .control-unit { border: 1px solid var(--dim); padding: 15px; position: relative; transition: 0.3s; cursor: pointer; }
        .control-unit.anchored { border-color: var(--p-green); box-shadow: 0 0 15px rgba(0, 255, 157, 0.2); }
        .lock-status { position: absolute; top: 5px; right: 10px; font-size: 9px; opacity: 0; }
        .anchored .lock-status { opacity: 1; color: var(--p-green); }

        /* 控制台 */
        .console-zone { margin-top: 30px; border-top: 2px solid var(--p-green); padding-top: 15px; }
        input { width: 100%; background: transparent; border: 1px solid var(--dim); color: var(--p-green); padding: 12px; outline: none; font-size: 16px; }

        @media (max-width: 600px) {
            .stat-val { font-size: 24px; }
            .matrix-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="world-shell">
    <div class="header">
        <div class="stat-box">
            <div class="stat-label">GLOBAL_RESONANCE</div>
            <div class="stat-val" id="global-res">0.8241</div>
            <div style="font-size: 9px;">STATUS: <span id="sys-status">LOCKED</span></div>
        </div>
        <div class="stat-box" style="text-align: right;">
            <div class="stat-label">CONTROL_AUTHORITY</div>
            <div class="stat-val" style="color: var(--p-red);">12.4%</div>
            <div style="font-size: 9px;">WEI_JUERAN // ROOT</div>
        </div>
    </div>

    <div class="matrix-grid" id="matrix">
        </div>

    <div class="console-zone">
        <div class="stat-label">// COMMAND_CONSOLE (Double-click variable to Anchor)</div>
        <input type="text" id="cmd" placeholder="输入变量或自然语言指令 (例如: 爱, 战争停止)..." oninput="WorldModel.analyze()">
    </div>
</div>

<script>
const Params = [
    { key: 'rho', name: 'CAPITAL_ATTR', desc: '资本引力', val: 35 },
    { key: 'sigma', name: 'TECH_DIFFUSION', desc: '技术扩散', val: 15 },
    { key: 'beta', name: 'INST_INERTIA', desc: '制度惯性', val: 50 }
];

let Anchors = {};

const WorldModel = {
    init() {
        const root = document.getElementById('matrix');
        root.innerHTML = Params.map(p => `
            <div class="control-unit" id="unit-${p.key}" ondblclick="WorldModel.toggleAnchor('${p.key}')">
                <span class="lock-status">[ STABLE ANCHOR ]</span>
                <div class="stat-label">${p.name} (${p.key})</div>
                <div style="font-size: 11px; margin-bottom: 10px;">${p.desc}</div>
                <input type="range" style="width:100%" min="0" max="100" value="${p.val}" oninput="WorldModel.update('${p.key}', this.value)">
                <div style="text-align:right; font-size: 12px;" id="v-${p.key}">${p.val}</div>
            </div>
        `).join('');
        this.analyze();
    },

    toggleAnchor(key) {
        Anchors[key] = !Anchors[key];
        document.getElementById(`unit-${key}`).classList.toggle('anchored');
        this.analyze();
    },

    update(key, val) {
        if (Anchors[key]) return;
        const p = Params.find(i => i.key === key);
        p.val = parseFloat(val);
        document.getElementById(`v-${key}`).innerText = val;
        this.analyze();
    },

    analyze() {
        const input = document.getElementById('cmd').value;
        let resonance = 0.8241;
        
        // 1. 锚点稳定性修正
        let anchorCount = Object.keys(Anchors).filter(k => Anchors[k]).length;
        let stability = 1 + (anchorCount * 0.2); // 每个锚点增加 20% 确定性

        // 2. 语义识别：当识别到“爱”时，全局共振向上坍缩
        if (/(爱|love|peace|和谐)/.test(input)) {
            resonance = Math.min(0.9999, resonance * 1.15 * stability);
            document.getElementById('sys-status').innerText = "HARMONIC_ALIGNMENT";
        } else {
            document.getElementById('sys-status').innerText = "OPERATIONAL";
        }

        // 3. 计算破碎概率（模型核心）
        let shatter = (Params[0].val * 0.4 + Params[1].val * 0.3 + Params[2].val * 0.3) / 100;
        if (anchorCount > 0) shatter /= (stability * 1.5); // 锚点显著降低系统破碎风险

        document.getElementById('global-res').innerText = resonance.toFixed(4);
        // 如果共振极高，改变颜色
        document.getElementById('global-res').style.color = resonance > 0.9 ? "var(--p-green)" : "white";
    }
};

window.onload = () => WorldModel.init();
</script>
</body>
</html>
